<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>工場勤務でも世界を救いたい</title>
<style>
  :root{
    --bg:#1b2230; --panel:#232d40; --panel2:#2c3850; --line:#3d4c6b;
    --text:#e8eefb; --sub:#9fb0cc; --gold:#ffd257; --green:#5fe08a; --red:#ff7b7b; --blue:#5ab0ff;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif;
    display:flex; flex-direction:column; align-items:center; overflow:hidden;
  }
  #hud{
    width:100%; max-width:980px; display:flex; align-items:center; gap:10px;
    padding:8px 10px; flex-wrap:wrap;
  }
  #avatar{
    width:52px; height:52px; border-radius:12px; border:2px solid var(--gold);
    object-fit:cover; flex-shrink:0;
  }
  #moneyBox{flex:1; min-width:180px;}
  #money{font-size:26px; font-weight:800; color:var(--gold); line-height:1.1; white-space:nowrap;}
  #subInfo{font-size:12px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .hudBtn{
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:10px; padding:9px 12px; font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap;
  }
  .hudBtn:hover{background:#37476a;}
  #wrap{position:relative; width:100%; max-width:980px; flex:1; min-height:0;}
  canvas{
    display:block; width:100%; height:100%;
    border-radius:12px; touch-action:none; background:#11161f;
  }
  #help{
    width:100%; max-width:980px; padding:6px 10px 10px; font-size:12px; color:var(--sub); text-align:center;
  }
  /* ---- modal ---- */
  #overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
    align-items:center; justify-content:center; z-index:20; padding:14px;
  }
  #overlay.show{display:flex;}
  #modal{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    width:100%; max-width:460px; max-height:86vh; overflow-y:auto; padding:16px;
  }
  #modal h2{font-size:18px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;}
  #modal h2 .x{cursor:pointer; color:var(--sub); font-size:22px; padding:0 6px;}
  .item{
    background:var(--panel2); border:1px solid var(--line); border-radius:10px;
    padding:10px 12px; margin-bottom:8px; display:flex; align-items:center; gap:10px;
  }
  .item.done{border-color:var(--gold); background:#33395022;}
  .item.locked{opacity:.55;}
  .item .ic{font-size:26px; width:34px; text-align:center; flex-shrink:0;}
  .item .info{flex:1; min-width:0;}
  .item .nm{font-weight:700; font-size:14px;}
  .item .ds{font-size:12px; color:var(--sub);}
  .buy{
    background:var(--green); color:#0d2417; border:none; border-radius:8px;
    padding:8px 12px; font-weight:800; font-size:13px; cursor:pointer; white-space:nowrap; flex-shrink:0;
  }
  .buy.no{background:#4a5674; color:#8b97b4; cursor:not-allowed;}
  .buy.danger{background:var(--red); color:#3a0d0d;}
  .buy.gold{background:var(--gold); color:#4a3708;}
  textarea{
    width:100%; height:90px; background:#161d2b; color:var(--text);
    border:1px solid var(--line); border-radius:8px; padding:8px; font-size:12px; resize:vertical;
  }
  input[type=text]{
    width:100%; background:#161d2b; color:var(--text);
    border:1px solid var(--line); border-radius:8px; padding:8px; font-size:13px;
  }
  .rankRow{
    display:flex; align-items:center; gap:8px; padding:8px 10px; margin-bottom:6px;
    background:var(--panel2); border:1px solid var(--line); border-radius:10px; font-size:13px;
  }
  .rankRow.me{border-color:var(--gold);}
  .rankRow .pos{width:30px; text-align:center; font-size:16px;}
  .rankRow .rn{flex:1; font-weight:700; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .rankRow .rs{color:var(--gold); font-weight:800; white-space:nowrap;}
  .rankRow .rx{color:var(--sub); font-size:11px; white-space:nowrap;}
  .row{display:flex; gap:8px; margin-top:8px;}
  .row .buy{flex:1;}
  #toasts{
    position:fixed; left:50%; top:74px; transform:translateX(-50%);
    z-index:30; display:flex; flex-direction:column; gap:6px; pointer-events:none; align-items:center;
  }
  .toast{
    background:rgba(20,28,44,.92); border:1px solid var(--line); color:var(--text);
    border-radius:10px; padding:8px 16px; font-size:13px; font-weight:700;
    animation:pop .25s ease, fade .5s ease 2.4s forwards; white-space:nowrap;
  }
  .toast.gold{
    background:linear-gradient(135deg,#4a3b10,#6b5518); border-color:var(--gold); color:var(--gold);
    font-size:15px; padding:12px 22px; box-shadow:0 0 24px rgba(255,210,87,.35);
    animation:pop .25s ease, fade .6s ease 3.6s forwards;
  }
  @keyframes pop{from{transform:translateY(-8px) scale(.9); opacity:0;}}
  @keyframes fade{to{opacity:0;}}
</style>
</head>

let S = null;
function newState(){
  return {
    money: 200,
    totalEarned: 0,
    slots: Array(SLOT_N).fill(null), // {t, lv, buf, timer}
    capLv: 1, spdLv: 1,
    workers: 0,
    proWorkers: 0,
    carryN: 0, carryV: 0,
    facLv: 1,
    ach: {},
    stats: {itemsSold: 0},
    opt: {bgm: true, sfx: true},
    rpg: {stage:0, kings:[false,false,false,false], demon:false,
          ownedW:[true,false,false,false,false,false], ownedA:[true,false,false,false,false], potions:0, rngLv:1},
    storySeen: false,
    last: Date.now(),
  };
}
function migrate(s){
  if(!s.facLv){
    let hi = -1;
    s.slots.forEach((m,i)=>{ if(m) hi = i; });
    s.facLv = 1;
    while(s.facLv < FAC_MAX && FAC[s.facLv].slots < hi+1) s.facLv++;
  }
  while(s.slots.length < SLOT_N) s.slots.push(null);
  if(!s.ach) s.ach = {};
  if(!s.stats) s.stats = {itemsSold:0};
  if(s.stats.itemsSold == null) s.stats.itemsSold = 0;
  if(!s.opt) s.opt = {bgm:true, sfx:true};
  if(!s.proWorkers) s.proWorkers = 0;
  if(!s.rpg) s.rpg = {stage:0, kings:[false,false,false,false], demon:false,
                      ownedW:[true,false,false,false,false,false], ownedA:[true,false,false,false,false], potions:0};
  if(!s.rpg.rngLv) s.rpg.rngLv = 1;
  if(s.storySeen === undefined) s.storySeen = false;
  return s;
}
function facSlots(){ return FAC[S.facLv].slots; }
function machineVal(m){ return Math.round(TYPES[m.t].val * Math.pow(1.25, m.lv-1)); }
function machineItv(m){ return TYPES[m.t].itv * Math.pow(0.97, m.lv-1); }
function machineUpCost(m){ return Math.round(TYPES[m.t].cost * 0.6 * Math.pow(1.55, m.lv)); }
function typeCost(t){
  const owned = S.slots.filter(s=>s && s.t===t).length;
  return Math.round(TYPES[t].cost * Math.pow(1.18, owned));
}
function capMax(){ return 15 + (S.capLv-1)*10; }
function capUpCost(){ return Math.round(250 * Math.pow(1.9, S.capLv-1)); }
function playerSpd(){ return 170 * (1 + (S.spdLv-1)*0.10); }
function spdUpCost(){ return Math.round(350 * Math.pow(1.9, S.spdLv-1)); }
function workerCost(){ return Math.round(1200 * Math.pow(2.1, S.workers)); }
function proWorkerCost(){ return Math.round(50000 * Math.pow(2.8, S.proWorkers)); }
function achCount(){ return Object.keys(S.ach).length; }

// ---------- セーブ / ロード ----------
function save(){
  S.last = Date.now();
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }catch(e){}
}
function load(){
  try{
    const j = localStorage.getItem(SAVE_KEY);
    if(!j) return null;
    const s = JSON.parse(j);
    if(!s || !Array.isArray(s.slots)) return null;
    return migrate(s);
  }catch(e){ return null; }
}
function exportCode(){
  S.last = Date.now();
  return "FT1." + btoa(unescape(encodeURIComponent(JSON.stringify(S))));
}
function importCode(code){
  try{
    code = code.trim();
    if(!code.startsWith("FT1.")) return false;
    const s = JSON.parse(decodeURIComponent(escape(atob(code.slice(4)))));
    if(!s || !Array.isArray(s.slots)) return false;
    S = migrate(s);
    applyOffline();
    resetActors();
    save();
    return true;
  }catch(e){ return false; }
}

// オフライン(閉じている間)の生産
function applyOffline(){
  const dt = Math.min(Math.max((Date.now() - (S.last||Date.now()))/1000, 0), 8*3600); // 最大8時間
  if(dt < 5) return;
  let workerSold = 0;
  for(const m of S.slots){
    if(!m) continue;
    // オフライン中は生産効率1/3
    const produced = dt / machineItv(m) / 3;
    const cap = TYPES[m.t].buf;
    const fit = Math.min(produced, cap - m.buf);
    m.buf = Math.floor(Math.min(cap, m.buf + produced));
    const effWorkers = S.workers + (S.proWorkers||0)*3;
    if(effWorkers > 0){
      const overflow = Math.max(0, produced - fit);
      workerSold += overflow * machineVal(m) * 0.5 * Math.min(1, effWorkers/3);
    }
  }
  workerSold = Math.floor(workerSold);
  if(workerSold > 0){ S.money += workerSold; S.totalEarned += workerSold; }
  const mins = Math.floor(dt/60);
  if(mins >= 1){
    toast(`⏰ おかえりなさい! ${mins}分間の生産が溜まっています` + (workerSold>0 ? `(作業員が ¥${fmt(workerSold)} 出荷済み)` : ""));
  }
}

// ---------- サウンド(Web Audioで生成・外部ファイル不要) ----------
let ac = null, sfxGain = null, bgmGain = null, bgmInt = null, bgmStep = 0, bgmNext = 0;
function audioInit(){
  if(ac){ if(ac.state === "suspended") ac.resume(); return; }
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;
  ac = new AC();
  sfxGain = ac.createGain(); sfxGain.gain.value = 0.9; sfxGain.connect(ac.destination);
  bgmGain = ac.createGain(); bgmGain.gain.value = 0.55; bgmGain.connect(ac.destination);
}
function tone(dest, freq, dur, type, vol, when, slideTo){
  const t0 = ac.currentTime + Math.max(0, when || 0);
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(dest);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
function sfx(name){
  if(!S || !S.opt || !S.opt.sfx) return;
  audioInit(); if(!ac) return;
  switch(name){
    case "collect": tone(sfxGain, 620, 0.08, "square", 0.10, 0, 930); break;
    case "sell":    tone(sfxGain, 880, 0.09, "sine", 0.22); tone(sfxGain, 1318, 0.14, "sine", 0.20, 0.07); break;
    case "buy":     tone(sfxGain, 240, 0.14, "triangle", 0.30, 0, 150); break;
    case "upgrade": tone(sfxGain, 440, 0.16, "sawtooth", 0.12, 0, 900); break;
    case "hire":    tone(sfxGain, 523, 0.08, "square", 0.12); tone(sfxGain, 659, 0.10, "square", 0.12, 0.08); break;
    case "ach":     [523,659,784,1046].forEach((f,k)=>tone(sfxGain, f, 0.16, "triangle", 0.20, k*0.09)); break;
    case "expand":  [392,523,659,784,1046,1318].forEach((f,k)=>tone(sfxGain, f, 0.20, "triangle", 0.20, k*0.10)); break;
    case "hit":     tone(sfxGain, 200, 0.07, "square", 0.15, 0, 120); break;
    case "hurt":    tone(sfxGain, 130, 0.16, "sawtooth", 0.20, 0, 70); break;
    case "lose":    [392,330,262,196].forEach((f,k)=>tone(sfxGain, f, 0.22, "triangle", 0.18, k*0.16)); break;
  }
}
// BGM:かんたんチップチューンのループ
const BGM_BASS = [131,131,98,98,110,110,87,98];
const BGM_MEL  = [523,0,659,0, 784,0,659,523, 587,0,523,587, 659,0,0,0,
                  523,0,659,784, 880,0,784,659, 587,659,523,440, 523,0,0,0];
const BGM_STEP = 0.15;
function bgmSchedule(){
  while(bgmNext < ac.currentTime + 0.35){
    const s = bgmStep % 32;
    if(s % 4 === 0) tone(bgmGain, BGM_BASS[(s/4)|0], 0.5, "triangle", 0.10, bgmNext - ac.currentTime);
    const f = BGM_MEL[s];
    if(f) tone(bgmGain, f, 0.14, "square", 0.045, bgmNext - ac.currentTime);
    bgmStep++; bgmNext += BGM_STEP;
  }
}
function startBgm(){
  if(!S || !S.opt || !S.opt.bgm) return;
  audioInit(); if(!ac || bgmInt) return;
  bgmStep = 0; bgmNext = ac.currentTime + 0.1;
  bgmSchedule();
  bgmInt = setInterval(bgmSchedule, 120);
}
function stopBgm(){ if(bgmInt){ clearInterval(bgmInt); bgmInt = null; } }
// ブラウザの自動再生制限のため、最初の操作で音を開始する
addEventListener("pointerdown", ()=>{ audioInit(); startBgm(); });
addEventListener("keydown", ()=>{ audioInit(); startBgm(); });

const RANK_KEY = "factory-tycoon-ranking-v1";
const NAME_KEY = "factory-tycoon-name";
function loadRank(){ try{ return JSON.parse(localStorage.getItem(RANK_KEY)) || []; }catch(e){ return []; } }
function saveRankList(list){ try{ localStorage.setItem(RANK_KEY, JSON.stringify(list.slice(0,50))); }catch(e){} }
function myName(){ return (localStorage.getItem(NAME_KEY) || "").slice(0,12); }
function myEntry(){
  return {n: myName() || "あなた", s: Math.floor(S.totalEarned), a: achCount(), f: S.facLv, d: new Date().toISOString().slice(0,10)};
}
function openRank(){
  const me = myEntry();
  const others = loadRank().filter(e => e.n !== me.n);
  const all = [...others, {...me, me:true}].sort((a,b) => b.s - a.s);
  const medals = ["🥇","🥈","🥉"];
  let h = `<h2>🏅 ランキング(累計売上) <span class="x" onclick="closeModal()">✕</span></h2>`;
  all.forEach((e,i) => {
    h += `<div class="rankRow ${e.me?"me":""}"><div class="pos">${medals[i]||(i+1)+"位"}</div><div class="rn">${esc(e.n)}${e.me?" (あなた)":""}</div><div class="rs">¥${fmt(e.s)}</div><div class="rx">🏆${e.a} 工場Lv${e.f}</div></div>`;
  });
  h += `<div class="ds" style="color:var(--sub); font-size:12px; margin:10px 0 6px;">▼ 名前を入れて「コードを発行」→ 友達に送信。友達のコードを下に貼って「追加」すると同じ表で競えます。</div>`;
  h += `<input type="text" id="rankName" maxlength="12" placeholder="あなたの名前(12文字まで)" value="${esc(myName())}">`;
  h += `<textarea id="rankCode" style="margin-top:8px;" placeholder="ここに友達のスコアコードを貼り付け→「追加」"></textarea>`;

function esc(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
window.doRankExport = function(){
  const name = $$("rankName").value.trim().slice(0,12);
  if(!name){ toast("❌ 名前を入れてください"); return; }
  localStorage.setItem(NAME_KEY, name);
  const code = "FTR1." + btoa(unescape(encodeURIComponent(JSON.stringify(myEntry()))));

  ta.value = code;

};
window.doRankAdd = function(){
  try{
    const code = $$("rankCode").value.trim();
    if(!code.startsWith("FTR1.")) throw 0;
    const e = JSON.parse(decodeURIComponent(escape(atob(code.slice(5)))));
    if(!e || typeof e.n !== "string" || typeof e.s !== "number") throw 0;
    e.n = e.n.slice(0,12); e.s = Math.max(0, Math.floor(e.s));
    e.a = Math.max(0, Math.floor(e.a||0)); e.f = Math.max(1, Math.floor(e.f||1));
    const list = loadRank().filter(o => o.n !== e.n);
    list.push({n:e.n, s:e.s, a:e.a, f:e.f, d:String(e.d||"").slice(0,10)});
    saveRankList(list);
    toast(`✅ ${e.n} さんのスコアを追加!`);
    openRank();
  }catch(err){ toast("❌ コードが正しくありません"); }
};

function canvasPos(e){
  const r = cv.getBoundingClientRect();

  return { x:(p.clientX-r.left)/r.width*W, y:(p.clientY-r.top)/r.height*H };
}
function onTap(e){
  if(overlay.classList.contains("show")) return;
  const p = canvasPos(e);
  if(mode==="title"){ startFromTitle(); e.preventDefault(); return; }
  if(mode==="story"){ endStory(); e.preventDefault(); return; }

  if(mode==="castle"){ castleTap(p); e.preventDefault(); return; }
  if(mode==="battle"){
    player.tx = Math.max(30, Math.min(W-30, p.x));

}

const confs = [];
function confetti(x, y, n){
  const colors = ["#ffd257","#5fe08a","#5ab0ff","#ff7b7b","#d65ad6","#fff"];
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, sp = 60+Math.random()*220;
    confs.push({x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-120, color:colors[i%colors.length], age:0, life:1.2+Math.random()*0.8, r:2+Math.random()*3});
  }
}

// ---------- 人物の描画(黄ヘルメット+青ポロシャツ) ----------
function drawPerson(x, y, opts){
  const {shirt="#2f7fd4", scale=1, walk=0, isPlayer=false} = opts;
  const hm = opts.helmet || "#f5c542";
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  const bob = Math.sin(walk*10)*1.5;
  ctx.fillStyle = "rgba(0,0,0,.30)";
  ctx.beginPath(); ctx.ellipse(0, 20, 13, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.translate(0, bob);
  const lw = Math.sin(walk*10)*4;
  ctx.strokeStyle = "#26324a"; ctx.lineWidth = 5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(-4, 6); ctx.lineTo(-4+lw, 18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4, 6); ctx.lineTo(4-lw, 18); ctx.stroke();
  ctx.fillStyle = shirt;
  ctx.beginPath();
  ctx.moveTo(-10, -6); ctx.quadraticCurveTo(-12, 8, -7, 10);
  ctx.lineTo(7, 10); ctx.quadraticCurveTo(12, 8, 10, -6);
  ctx.quadraticCurveTo(0, -11, -10, -6); ctx.fill();
  ctx.fillStyle = "#1f5fa8";
  ctx.beginPath(); ctx.moveTo(-5,-8); ctx.lineTo(0,-3); ctx.lineTo(5,-8); ctx.lineTo(0,-9); ctx.fill();
  ctx.strokeStyle = shirt; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(-10, -4); ctx.lineTo(-13, 6-lw*0.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10, -4); ctx.lineTo(13, 6+lw*0.5); ctx.stroke();
  ctx.fillStyle = "#f6d7b8";
  ctx.beginPath(); ctx.arc(0, -18, 9, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#20242c";
  ctx.beginPath(); ctx.arc(0, -19, 9, Math.PI*0.95, Math.PI*2.05); ctx.fill();
  ctx.fillStyle = hm;
  ctx.beginPath(); ctx.arc(0, -22, 10, Math.PI, Math.PI*2); ctx.fill();
  ctx.fillRect(-11, -23, 22, 3.5);
  ctx.fillStyle = "rgba(255,255,255,.35)";
  ctx.beginPath(); ctx.arc(-3, -25, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#20242c";
  ctx.beginPath(); ctx.arc(-3.2, -17, 1.3, 0, Math.PI*2); ctx.arc(3.2, -17, 1.3, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#c98"; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(0, -14.5, 2.5, 0.2, Math.PI-0.2); ctx.stroke();
  if(isPlayer){
    ctx.fillStyle = "#ffd257";
    ctx.beginPath();
    ctx.moveTo(0, -40); ctx.lineTo(-5, -48); ctx.lineTo(5, -48); ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

// ---------- 内装(レベルで豪華に) ----------
function drawDeco(t){
  const lv = S.facLv;
  const fac = FAC[lv];
  // 上部の壁
  ctx.fillStyle = fac.wall;
  ctx.fillRect(0, 0, W, 34);
  ctx.fillStyle = "rgba(0,0,0,.25)";
  ctx.fillRect(0, 34, W, 5);
  // Lv2+ : 窓
  if(lv>=2){
    for(let x=50; x<W-120; x+=170){
      const g = ctx.createLinearGradient(x, 4, x, 28);
      g.addColorStop(0, "#bfe3ff"); g.addColorStop(1, "#7db9e8");
      ctx.fillStyle = g;
      ctx.fillRect(x, 5, 80, 24);
      ctx.strokeStyle = "rgba(0,0,0,.3)"; ctx.lineWidth = 2;
      ctx.strokeRect(x, 5, 80, 24);
      ctx.beginPath(); ctx.moveTo(x+40, 5); ctx.lineTo(x+40, 29); ctx.stroke();
    }
  }
  // Lv2+ : 観葉植物
  if(lv>=2){
    ctx.font = "26px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("🪴", 28, 80);
    ctx.fillText("🪴", 28, 520);
  }
  // Lv3+ : 社名バナー & 天井ライト
  if(lv>=3){
    ctx.fillStyle = "#1a2438";
    ctx.beginPath(); ctx.roundRect(W/2-150, 42, 300, 26, 8); ctx.fill();
    ctx.strokeStyle = "rgba(255,210,87,.6)"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(W/2-150, 42, 300, 26, 8); ctx.stroke();
    ctx.fillStyle = "#ffd257"; ctx.font = "bold 15px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("⚙️ SUPER FACTORY ⚙️", W/2, 60);
    for(let x=160; x<W-100; x+=320){
      const g = ctx.createRadialGradient(x, 40, 0, x, 40, 130);
      g.addColorStop(0, "rgba(255,244,200,.13)"); g.addColorStop(1, "rgba(255,244,200,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(x, 40, 130, 0, Math.PI*2); ctx.fill();
    }
  }
  // Lv4+ : レッドカーペット(出荷口まで)
  if(lv>=4){
    ctx.fillStyle = "rgba(178,48,66,.45)";
    ctx.fillRect(60, 258, DOCK.x-70, 34);
    ctx.fillStyle = "rgba(255,210,87,.5)";
    ctx.fillRect(60, 256, DOCK.x-70, 3);
    ctx.fillRect(60, 292, DOCK.x-70, 3);
  }else{
    ctx.strokeStyle = "rgba(255,210,87,.15)"; ctx.lineWidth = 2; ctx.setLineDash([14,10]);
    ctx.beginPath(); ctx.moveTo(40, 275); ctx.lineTo(DOCK.x-10, 275); ctx.stroke();
    ctx.setLineDash([]);
  }
  // Lv5 : 金の縁取り・トロフィー・輝き
  if(lv>=5){
    ctx.strokeStyle = "rgba(255,210,87,.55)"; ctx.lineWidth = 5;
    ctx.strokeRect(4, 4, W-8, H-8);
    ctx.font = "30px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("🏆", W-40, 90);
    ctx.fillText("💎", W-40, 500);
    for(let i=0;i<5;i++){
      const sx = 120 + i*180, sy = 90;
      const tw = (Math.sin(t*3 + i*1.7)+1)/2;
      ctx.globalAlpha = 0.25 + tw*0.6;
      ctx.fillStyle = "#fff2b0"; ctx.font = "14px sans-serif";
      ctx.fillText("✦", sx, sy);
      ctx.globalAlpha = 1;
    }
  }
}

// ---------- ワールド描画 ----------
function draw(t){
  if(mode==="title"){ drawTitle(t); return; }
  if(mode==="story"){ drawStory(t); return; }
  if(mode==="worldmap"){ drawMap(t); return; }
  if(mode==="battle"){ drawBattle(t); return; }
  if(mode==="castle"){ drawCastle(t); return; }
  drawFactory(t);
}
function drawFactory(t){
  ctx.clearRect(0,0,W,H);
  const fac = FAC[S.facLv];
  for(let y=0;y<H;y+=60){
    for(let x=0;x<W;x+=60){
      ctx.fillStyle = ((x+y)/60)%2 ? fac.floor[0] : fac.floor[1];
      ctx.fillRect(x,y,60,60);
    }
  }
  drawDeco(t);

  // 出荷口
  ctx.fillStyle = S.facLv>=5 ? "#4a4020" : "#31405e";
  ctx.fillRect(DOCK.x, DOCK.y-DOCK.h/2, DOCK.w, DOCK.h);
  ctx.fillStyle = "#ffd257";
  for(let i=0;i<4;i++){
    ctx.fillRect(DOCK.x, DOCK.y-DOCK.h/2 + 8 + i*38, 8, 22);
  }
  ctx.save();
  ctx.translate(DOCK.x+38, DOCK.y);
  ctx.rotate(-Math.PI/2);
  ctx.fillStyle = "#ffd257"; ctx.font = "bold 16px sans-serif"; ctx.textAlign="center";
  ctx.fillText("🚚 出荷口", 0, 0);
  ctx.restore();

  // ⚔️「世界を救う」ゲート(左端)
  const gg = ctx.createLinearGradient(0, 190, 40, 190);
  gg.addColorStop(0, "#5a2d8a"); gg.addColorStop(1, "#8a55c8");
  ctx.fillStyle = gg;
  ctx.fillRect(0, 190, 38, 170);
  ctx.fillStyle = `rgba(210,160,255,${(0.35+0.25*Math.sin(t*3)).toFixed(2)})`;
  ctx.fillRect(4, 198, 30, 154);
  ctx.font = "20px sans-serif"; ctx.textAlign = "center";
  ctx.fillText("🌀", 19, 245);
  ctx.save();
  ctx.translate(19, 300);
  ctx.rotate(-Math.PI/2);
  ctx.fillStyle = "#ffd257"; ctx.font = "bold 13px sans-serif";
  ctx.fillText("⚔️ 世界を救う", 0, -12);
  ctx.restore();

  // マシンスロット
  for(let i=0;i<SLOT_N;i++){
    const p = SLOT_POS[i], m = S.slots[i];
    if(i >= facSlots()){
      ctx.fillStyle = "rgba(10,14,22,.45)";
      ctx.beginPath(); ctx.roundRect(p.x-45, p.y-40, 90, 80, 8); ctx.fill();
      ctx.strokeStyle = "rgba(159,176,204,.25)"; ctx.lineWidth = 2;
      ctx.strokeRect(p.x-45, p.y-40, 90, 80);
      ctx.font = "22px sans-serif"; ctx.textAlign = "center";
      ctx.fillText("🔒", p.x, p.y+2);
      ctx.fillStyle = "rgba(159,176,204,.55)"; ctx.font = "10px sans-serif";
      ctx.fillText("拡張で解放", p.x, p.y+22);
      continue;
    }
    if(!m){
      ctx.strokeStyle = "rgba(159,176,204,.4)"; ctx.lineWidth = 2; ctx.setLineDash([6,6]);
      ctx.strokeRect(p.x-45, p.y-40, 90, 80);
      ctx.setLineDash([]);
      ctx.fillStyle = "rgba(159,176,204,.5)";
      ctx.font = "13px sans-serif"; ctx.textAlign = "center";
      ctx.fillText("＋ 空きスロット", p.x, p.y+4);
      continue;
    }
    const tp = TYPES[m.t];
    const producing = m.buf < tp.buf;
    // 本体(金属筐体)
    ctx.fillStyle = tp.color;
    ctx.beginPath(); ctx.roundRect(p.x-45, p.y-40, 90, 58, 8); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.16)";
    ctx.beginPath(); ctx.roundRect(p.x-45, p.y-40, 90, 12, 8); ctx.fill();
    ctx.fillStyle = "rgba(0,0,0,.22)";
    ctx.beginPath(); ctx.roundRect(p.x-45, p.y+6, 90, 12, 6); ctx.fill();
    // ボルト
    ctx.fillStyle = "rgba(10,14,22,.6)";
    for(const b of [[-39,-34],[39,-34],[-39,12],[39,12]]){
      ctx.beginPath(); ctx.arc(p.x+b[0], p.y+b[1], 2, 0, Math.PI*2); ctx.fill();
    }
    // 側面の通気口
    ctx.strokeStyle = "rgba(0,0,0,.35)"; ctx.lineWidth = 2;
    for(let k=0;k<3;k++){
      ctx.beginPath(); ctx.moveTo(p.x-38, p.y-26+k*7); ctx.lineTo(p.x-24, p.y-26+k*7); ctx.stroke();
    }
    // 回転ギア(稼働中だけ回る)
    ctx.save();
    ctx.translate(p.x+31, p.y-22);
    ctx.rotate(producing ? t*2.5+i : 0.6);
    ctx.fillStyle = "rgba(15,20,32,.55)";
    for(let k=0;k<8;k++){ ctx.rotate(Math.PI/4); ctx.fillRect(-1.6, -9, 3.2, 4); }
    ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = tp.color;
    ctx.beginPath(); ctx.arc(0, 0, 2.2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // ステータスランプ(緑=稼働中 / 赤=満杯)
    ctx.fillStyle = producing ? `rgba(95,224,138,${(0.45+0.55*(Math.sin(t*6+i)+1)/2).toFixed(2)})` : "#ff7b7b";
    ctx.beginPath(); ctx.arc(p.x+38, p.y-34, 3, 0, Math.PI*2); ctx.fill();
    // プレス機(生産の進みに合わせて押し込む)
    const press = producing ? Math.min(1, m.timer/machineItv(m)) : 0;
    const py = p.y - 36 + press*12;
    ctx.fillStyle = "rgba(15,20,32,.5)";
    ctx.fillRect(p.x-4, p.y-40, 8, py-(p.y-40));
    ctx.fillRect(p.x-13, py, 26, 6);
    // 製品アイコン
    ctx.font = "22px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(tp.ic, p.x, p.y+2);
    // 排出トレイ(製品が1個ずつ見える)
    ctx.fillStyle = "rgba(8,12,20,.55)";
    ctx.beginPath(); ctx.roundRect(p.x-40, p.y+22, 80, 16, 4); ctx.fill();
    const cnt = Math.floor(m.buf);
    const shown = cnt > 6 ? 5 : cnt;
    for(let k=0;k<shown;k++){
      ctx.fillStyle = "rgba(220,228,244,.85)";
      ctx.beginPath(); ctx.arc(p.x-33+k*13, p.y+30, 5.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.font = "11px sans-serif"; ctx.fillStyle = "#fff";
    for(let k=0;k<shown;k++) ctx.fillText(tp.ic, p.x-33+k*13, p.y+34);
    if(cnt > 6){
      ctx.fillStyle = "#ffd257"; ctx.font = "bold 10px sans-serif";
      ctx.fillText(`+${cnt-5}`, p.x+31, p.y+34);
    }
    // 名前・Lv
    ctx.fillStyle = "#fff"; ctx.font = "bold 11px sans-serif";
    ctx.fillText(`${tp.name} Lv${m.lv}`, p.x, p.y+50);
    // 貯蔵ゲージ
    const ratio = m.buf/tp.buf;
    ctx.fillStyle = "rgba(0,0,0,.4)";
    ctx.fillRect(p.x-40, p.y-52, 80, 9);
    ctx.fillStyle = ratio>=1 ? "#ff7b7b" : "#5fe08a";
    ctx.fillRect(p.x-40, p.y-52, 80*ratio, 9);
    ctx.fillStyle = "#fff"; ctx.font = "9px sans-serif";
    ctx.fillText(`${Math.floor(m.buf)}/${tp.buf}`, p.x, p.y-44.5);
    if(ratio>=1){

const pops = [];
function pop(x, y, text, color){ pops.push({x, y, text, color, age:0}); }

// 製品が飛び出すアニメ(マシン→排出トレイ、回収時はトレイ→プレイヤー)
const itemPops = [];
function spawnItemPop(i){
  if(itemPops.length > 50) return;
  const m = S.slots[i]; if(!m) return;
  const p = SLOT_POS[i];
  const k = Math.max(0, Math.min(Math.floor(m.buf)-1, 5));
  itemPops.push({ic:TYPES[m.t].ic, x0:p.x, y0:p.y-6, x1:p.x-33+k*13, y1:p.y+32, age:0, life:0.45});
}

// ---------- ゲームロジック ----------
let collectCd = 0;
function moveToward(o, spd, dt){
  const dx = o.tx - o.x, dy = o.ty - o.y;
  const d = Math.hypot(dx, dy);
  if(d < 3){ o.walk = 0; return true; }
  const step = Math.min(spd*dt, d);
  o.x += dx/d*step; o.y += dy/d*step;
  o.walk += dt;
  return false;
}

function tick(dt, t){
  // 生産
  for(let i=0;i<SLOT_N;i++){
    const m = S.slots[i];
    if(!m) continue;
    const cap = TYPES[m.t].buf;
    if(m.buf >= cap) continue;
    m.timer += dt;
    const itv = machineItv(m);
    while(m.timer >= itv && m.buf < cap){
      m.timer -= itv; m.buf++;
      spawnItemPop(i);
    }
  }

  if(mode==="factory"){
  // プレイヤー移動
  let kx=0, ky=0;
  if(keys["a"]||keys["arrowleft"]) kx--;
  if(keys["d"]||keys["arrowright"]) kx++;
  if(keys["w"]||keys["arrowup"]) ky--;
  if(keys["s"]||keys["arrowdown"]) ky++;
  if(kx||ky){
    const n = Math.hypot(kx,ky);
    player.x = Math.max(30, Math.min(W-30, player.x + kx/n*playerSpd()*dt));
    player.y = Math.max(50, Math.min(H-30, player.y + ky/n*playerSpd()*dt));
    player.tx = player.x; player.ty = player.y;
    player.walk += dt;
  }else{
    moveToward(player, playerSpd(), dt);
  }

  // 回収(近接・自動)
  collectCd -= dt;
  if(collectCd <= 0){
    for(let i=0;i<facSlots();i++){
      const m = S.slots[i];
      if(!m || m.buf < 1) continue;
      const p = SLOT_POS[i];
      if(Math.hypot(player.x-p.x, player.y-p.y) < 75 && S.carryN < capMax()){
        const n = Math.min(Math.floor(m.buf), capMax()-S.carryN);
        if(n>0){
          m.buf -= n;
          S.carryN += n;
          S.carryV += n * machineVal(m);
          pop(p.x, p.y-60, `+${n}個`, "#5ab0ff");
          sfx("collect");
          for(let k=0;k<Math.min(n,4);k++){
            itemPops.push({ic:TYPES[m.t].ic, x0:p.x-33+k*13, y0:p.y+32, x1:player.x, y1:player.y-24, age:-k*0.06, life:0.3});
          }
          collectCd = 0.35;
        }
      }
    }
  }
  // 売却(出荷口・自動)
  if(S.carryN>0 && player.x > DOCK.x-55 && Math.abs(player.y-DOCK.y) < DOCK.h/2+30){
    S.money += S.carryV;
    S.totalEarned += S.carryV;
    S.stats.itemsSold += S.carryN;
    pop(DOCK.x-30, DOCK.y-40, `+¥${fmt(S.carryV)}`, "#5fe08a");
    sfx("sell");
    S.carryN = 0; S.carryV = 0;
  }

  // ⚔️「世界を救う」ゲート(左端に入るとマップへ)
  gateCd -= dt;
  if(gateCd <= 0 && player.x < 58 && Math.abs(player.y-275) < 85){
    setMode("worldmap");
  }
  }else if(mode==="battle" && B && !document.hidden){
    battleTick(dt);
  }else if(mode==="story"){
    storyT += dt;
    if(storyDone()) endStory();
  }

  // 作業員AI(それぞれ別のマシンを担当して分担する)
  for(const w of workers){
    w.wait -= dt;
    if(w.state==="idle"){
      if(w.wait>0) continue;
      // 他の作業員が向かっているマシンは選ばない
      const claimed = new Set();
      for(const o of workers){ if(o!==w && o.state==="go") claimed.add(o.slot); }
      let best=-1, bestBuf=0.9;
      for(let i=0;i<facSlots();i++){
        const m = S.slots[i];
        if(m && m.buf > bestBuf && !claimed.has(i)){ best=i; bestBuf=m.buf; }
      }
      if(best>=0){
        w.slot = best;
        w.tx = SLOT_POS[best].x + 30; w.ty = SLOT_POS[best].y + 45;
        w.state = "go";
      }else w.wait = 0.6;
    }else if(w.state==="go"){
      if(moveToward(w, w.spd, dt)){
        const m = S.slots[w.slot];
        if(m && m.buf>=1){
          const n = Math.min(Math.floor(m.buf), w.cap - w.carryN);
          m.buf -= n;
          w.carryN += n; w.carryV += n*machineVal(m);
        }
        // スーパー作業員は容量に余裕があれば別のマシンもはしごする
        let next = -1;
        if(w.pro && w.carryN < w.cap*0.6){
          const claimed = new Set();
          for(const o of workers){ if(o!==w && o.state==="go") claimed.add(o.slot); }
          let bestBuf = 0.9;
          for(let i=0;i<facSlots();i++){
            const m2 = S.slots[i];
            if(m2 && i!==w.slot && m2.buf > bestBuf && !claimed.has(i)){ next=i; bestBuf=m2.buf; }
          }
        }
        if(next>=0){
          w.slot = next;
          w.tx = SLOT_POS[next].x + 30; w.ty = SLOT_POS[next].y + 45;
        }else if(w.carryN>0){
          w.tx = DOCK.x - 30; w.ty = DOCK.y + (Math.random()*80-40);
          w.state = "dock";
        }else{
          // 空振り:何も持っていないなら出荷口には行かず次を探す
          w.state = "idle"; w.wait = 0.3;
        }
      }
    }else if(w.state==="dock"){
      if(moveToward(w, w.spd, dt)){
        if(w.carryN>0){
          S.money += w.carryV; S.totalEarned += w.carryV;
          S.stats.itemsSold += w.carryN;
          pop(w.x, w.y-30, `+¥${fmt(w.carryV)}`, "#9fe0a0");
        }
        w.carryN=0; w.carryV=0;
        w.state = "idle"; w.wait = 0.4;
      }
    }
  }

  // 収益ポップ・紙吹雪
  for(let i=pops.length-1;i>=0;i--){
    pops[i].age += dt;
    if(pops[i].age>1.0) pops.splice(i,1);
  }
  for(let i=confs.length-1;i>=0;i--){
    const c = confs[i];
    c.age += dt;
    c.vy += 300*dt;
    c.x += c.vx*dt; c.y += c.vy*dt;
    if(c.age > c.life) confs.splice(i,1);
  }
  for(let i=itemPops.length-1;i>=0;i--){
    itemPops[i].age += dt;
    if(itemPops[i].age > itemPops[i].life) itemPops.splice(i,1);
  }

  // 実績チェック(1秒ごと)
  achTimer -= dt;
  if(achTimer<=0){ checkAch(); achTimer = 1.0; }
}

// ---------- モード切替 ----------
function setMode(m){
  mode = m;
  closeModal();
  $$("hud").style.visibility = (m==="title" || m==="story") ? "hidden" : "visible";
  $$("btnBack").style.display = (m==="worldmap" || m==="castle") ? "block" : "none";
  $$("btnBack").textContent = m==="castle" ? "🗺️ マップに戻る" : "🏭 工場に戻る";
  $$("battleBtns").style.display = m==="battle" ? "flex" : "none";
  if(m==="factory"){
    player.x = player.tx = 95; player.y = player.ty = 275;
    gateCd = 1.5;
  }
  if(m==="battle") updatePotionBtn();
}
$$("btnBack").onclick = ()=>{ setMode(mode==="castle" ? "worldmap" : "factory"); };
$$("btnFlee").onclick = ()=>{
  if(mode!=="battle" || !B) return;
  const dest = B.kind==="stage" ? "worldmap" : "castle";
  B = null;
  toast("🏃 にげた!");
  setMode(dest);
};
$$("btnPotion").onclick = ()=>usePotion();

// ---------- 装備屋 ----------
function openEquip(){
  let h = `<h2>⚔️ 装備屋 <span class="x" onclick="closeModal()">✕</span></h2>`;
  h += `<div class="ds" style="color:var(--sub); font-size:12px; margin-bottom:8px;">攻撃 ${heroAtk()} / 防御 ${heroDef()} / HP ${heroMaxHp()} / 👟速度Lv${S.spdLv}(戦闘の移動にも効く!)</div>`;
  h += `<div class="item"><div class="ic">🧪</div><div class="info"><div class="nm">回復ポーション(所持 ${S.rpg.potions}/15個)</div><div class="ds">戦闘中にHPを50%回復(Qキー or ボタン)</div></div><button class="buy ${S.money>=RPG.potionCost && S.rpg.potions<15?"":"no"}" onclick="buyPotion()">¥${fmt(RPG.potionCost)}</button></div>`;
  if(S.rpg.rngLv < RNG_MAX){
    h += `<div class="item"><div class="ic">🌀</div><div class="info"><div class="nm">攻撃範囲拡大 Lv${S.rpg.rngLv}</div><div class="ds">周囲の敵をまとめて斬れる範囲 ${atkRange()} → ${atkRange()+7}</div></div><button class="buy ${S.money>=rngUpCost()?"":"no"}" onclick="buyRange()">¥${fmt(rngUpCost())}</button></div>`;
  }else{
    h += `<div class="item done"><div class="ic">🌀</div><div class="info"><div class="nm">攻撃範囲拡大 Lv${S.rpg.rngLv}(最大)</div><div class="ds">攻撃範囲 ${atkRange()}</div></div></div>`;
  }
  h += `<div class="ds" style="margin:10px 0 4px; color:var(--sub); font-size:12px;">▼ 武器(いちばん強い所持武器を自動装備)</div>`;
  const wCur = RPG.weapons.indexOf(curWeapon());
  RPG.weapons.forEach((wp,i)=>{
    if(S.rpg.ownedW[i]){
      h += `<div class="item ${i===wCur?"done":""}"><div class="ic">${wp.ic}</div><div class="info"><div class="nm">${wp.name} ${i===wCur?"(装備中)":""}</div><div class="ds">攻撃力 ${wp.atk}</div></div></div>`;
    }else{
      h += `<div class="item"><div class="ic">${wp.ic}</div><div class="info"><div class="nm">${wp.name}</div><div class="ds">攻撃力 ${wp.atk}</div></div><button class="buy ${S.money>=wp.cost?"":"no"}" onclick="buyWeapon(${i})">¥${fmt(wp.cost)}</button></div>`;
    }
  });
  h += `<div class="ds" style="margin:10px 0 4px; color:var(--sub); font-size:12px;">▼ 防具</div>`;
  const aCur = RPG.armors.indexOf(curArmor());
  RPG.armors.forEach((ar,i)=>{
    if(S.rpg.ownedA[i]){
      h += `<div class="item ${i===aCur?"done":""}"><div class="ic">${ar.ic}</div><div class="info"><div class="nm">${ar.name} ${i===aCur?"(装備中)":""}</div><div class="ds">防御 ${ar.def}・HP +${ar.hp}</div></div></div>`;
    }else{
      h += `<div class="item"><div class="ic">${ar.ic}</div><div class="info"><div class="nm">${ar.name}</div><div class="ds">防御 ${ar.def}・HP +${ar.hp}</div></div><button class="buy ${S.money>=ar.cost?"":"no"}" onclick="buyArmor(${i})">¥${fmt(ar.cost)}</button></div>`;
    }
  });
  openModal(h);
}
window.buyPotion = function(){
  if(S.money < RPG.potionCost || S.rpg.potions >= 15) return;
  S.money -= RPG.potionCost; S.rpg.potions++;
  sfx("buy"); save(); openEquip(); updateHud(); updatePotionBtn();
};
window.buyWeapon = function(i){
  const wp = RPG.weapons[i];
  if(S.rpg.ownedW[i] || S.money < wp.cost) return;
  S.money -= wp.cost; S.rpg.ownedW[i] = true;
  toast(`${wp.ic} ${wp.name}を手に入れた!`, true);
  sfx("upgrade"); save(); openEquip(); updateHud();
};
window.buyRange = function(){
  if(S.rpg.rngLv >= RNG_MAX || S.money < rngUpCost()) return;
  S.money -= rngUpCost(); S.rpg.rngLv++;
  toast(`🌀 攻撃範囲が広がった!(Lv${S.rpg.rngLv})`);
  sfx("upgrade"); save(); openEquip(); updateHud();
};
window.buyArmor = function(i){
  const ar = RPG.armors[i];
  if(S.rpg.ownedA[i] || S.money < ar.cost) return;
  S.money -= ar.cost; S.rpg.ownedA[i] = true;
  toast(`${ar.ic} ${ar.name}を手に入れた!`, true);
  sfx("upgrade"); save(); openEquip(); updateHud();
};
$$("btnEquip").onclick = openEquip;

// ---------- 戦闘 ----------
function startBattle(kind, idx){
  const defs = kind==="stage" ? STAGES[idx].foes.map(k=>EN[k]) : [kind==="king" ? KINGS[idx] : DEMON];
  B = {
    kind, idx, over:0, endT:0, slash:0,
    hp:heroMaxHp(), maxHp:heroMaxHp(), atkCd:0.3,
    projs: [],
    enemies: defs.map((d,i)=>({...d, x:640+((i*95)%230), y:150+i*105, hp:d.hp, maxHp:d.hp, cd:1.2+Math.random()*0.6, scd:1.5+Math.random()})),
  };
  player.x = player.tx = 140; player.y = player.ty = 275;
  setMode("battle");
  if(kind==="stage") toast(`⚔️ ${STAGES[idx].name} に挑戦!`);
  else toast(`⚔️ ${defs[0].n} が立ちはだかる!`, true);
}
function updatePotionBtn(){ $$("btnPotion").textContent = `🧪 回復 ×${S.rpg.potions}(Q)`; }
function usePotion(){
  if(mode!=="battle" || !B || B.over || S.rpg.potions<=0 || B.hp>=B.maxHp) return;
  S.rpg.potions--;
  const heal = Math.round(B.maxHp*0.5);
  B.hp = Math.min(B.maxHp, B.hp+heal);
  pop(player.x, player.y-55, `+${heal}`, "#5fe08a");
  sfx("sell"); save(); updatePotionBtn();
}
function battleTick(dt){
  if(B.over){
    B.endT -= dt;
    if(B.endT<=0) finishBattle();
    return;
  }
  // 移動(👟スピード強化が効く)
  let kx=0, ky=0;
  if(keys["a"]||keys["arrowleft"]) kx--;
  if(keys["d"]||keys["arrowright"]) kx++;
  if(keys["w"]||keys["arrowup"]) ky--;
  if(keys["s"]||keys["arrowdown"]) ky++;
  if(kx||ky){
    const n = Math.hypot(kx,ky);
    player.x = Math.max(30, Math.min(W-30, player.x + kx/n*playerSpd()*dt));
    player.y = Math.max(70, Math.min(H-30, player.y + ky/n*playerSpd()*dt));
    player.tx = player.x; player.ty = player.y;
    player.walk += dt;
  }else{
    moveToward(player, playerSpd(), dt);
  }
  // 自動攻撃(範囲内の敵をまとめて斬る)
  B.atkCd -= dt; B.slash -= dt;
  const w = curWeapon();
  const rng = atkRange();
  if(B.atkCd <= 0){
    const targets = B.enemies.filter(e => e.hp>0 && Math.hypot(e.x-player.x, e.y-player.y) < rng + e.size*0.4);
    if(targets.length > 0){
      for(const tgt of targets){
        const dmg = Math.round(heroAtk()*(0.9+Math.random()*0.2));
        tgt.hp -= dmg;
        pop(tgt.x, tgt.y-tgt.size-22, `-${dmg}`, "#ffd257");
        if(tgt.hp<=0){ pop(tgt.x, tgt.y-10, "💥", "#fff"); confetti(tgt.x, tgt.y, 18); }
      }
      B.slash = 0.15;
      sfx("hit");
      B.atkCd = w.cd;
    }
  }
  // 敵AI(近接:追いかけて殴る / 遠距離:距離をとって撃つ)
  for(const e of B.enemies){
    if(e.hp<=0) continue;
    const dx = player.x-e.x, dy = player.y-e.y, d = Math.hypot(dx,dy) || 1;
    if(e.shoot && !e.keepMelee){
      // 距離をキープ
      if(d < e.shoot.dist*0.55){
        e.x = Math.max(40, Math.min(W-40, e.x - dx/d*e.spd*dt));
        e.y = Math.max(70, Math.min(H-40, e.y - dy/d*e.spd*dt));
      }else if(d > e.shoot.dist){
        e.x += dx/d*e.spd*dt; e.y += dy/d*e.spd*dt;
      }
    }else if(d > 34){
      e.x += dx/d*e.spd*dt; e.y += dy/d*e.spd*dt;
    }
    // 近接攻撃
    e.cd -= dt;
    if(d < 48 && e.cd <= 0){
      const dmg = Math.max(1, Math.round((e.atk-heroDef())*(0.9+Math.random()*0.2)));
      B.hp -= dmg;
      pop(player.x, player.y-55, `-${dmg}`, "#ff7b7b");
      sfx("hurt");
      e.cd = 1.15;
    }
    // 遠距離攻撃(弾を発射)
    if(e.shoot){
      e.scd -= dt;
      if(e.scd <= 0 && d < e.shoot.dist + 80){
        B.projs.push({
          x:e.x, y:e.y, ic:e.shoot.ic,
          vx:dx/d*e.shoot.spd, vy:dy/d*e.shoot.spd,
          atk:e.atk*e.shoot.mul, age:0,
        });
        e.scd = e.shoot.cd;
      }
    }
  }
  // 弾の移動と命中判定
  for(let i=B.projs.length-1;i>=0;i--){
    const p2 = B.projs[i];
    p2.x += p2.vx*dt; p2.y += p2.vy*dt; p2.age += dt;
    if(Math.hypot(p2.x-player.x, p2.y-player.y) < 22){
      const dmg = Math.max(1, Math.round((p2.atk-heroDef())*(0.9+Math.random()*0.2)));
      B.hp -= dmg;
      pop(player.x, player.y-55, `-${dmg}`, "#ff7b7b");
      sfx("hurt");
      B.projs.splice(i,1);
      continue;
    }
    if(p2.age > 4 || p2.x < -30 || p2.x > W+30 || p2.y < -30 || p2.y > H+30) B.projs.splice(i,1);
  }
  if(B.enemies.every(e=>e.hp<=0)){ B.over = 1; B.endT = 1.4; sfx("expand"); confetti(W/2, H/2, 80); }
  else if(B.hp <= 0){ B.over = 2; B.endT = 1.4; sfx("lose"); }
}
function finishBattle(){
  const win = B.over === 1;
  const dest = B.kind==="stage" ? "worldmap" : "castle";
  if(win){
    let reward = 0;
    if(B.kind==="stage"){
      const first = B.idx >= S.rpg.stage;
      reward = Math.round(STAGES[B.idx].reward * (first ? 1 : 0.25));
      if(first) S.rpg.stage = B.idx + 1;
    }else if(B.kind==="king"){
      const first = !S.rpg.kings[B.idx];
      S.rpg.kings[B.idx] = true;
      reward = Math.round(KINGS[B.idx].reward * (first ? 1 : 0.1));
    }else{
      const first = !S.rpg.demon;
      S.rpg.demon = true;
      reward = Math.round(DEMON.reward * (first ? 1 : 0.05));
      toast("🌈 魔王を倒した!世界は救われた!!", true);
      confetti(W/2, H/2, 200);
    }
    S.money += reward; S.totalEarned += reward;
    toast(`🎉 勝利! 報酬 ¥${fmt(reward)}`, true);
  }else{
    toast("💀 やられてしまった…工場で稼いで装備を整えよう");
  }
  B = null;
  setMode(dest);
  save(); updateHud();
}

// ---------- マップ / 魔王城のクリック ----------
function mapTap(p){
  for(let i=0;i<10;i++){
    const n = MAP_NODES[i];
    if(Math.hypot(p.x-n.x, p.y-n.y) > 32) continue;
    if(i > S.rpg.stage){ toast("🔒 前のステージをクリアしよう"); return; }
    if(i === 9) setMode("castle");
    else startBattle("stage", i);
    return;
  }
}
function castleTap(p){
  for(let i=0;i<4;i++){
    const k = KING_POS[i];
    if(Math.hypot(p.x-k.x, p.y-k.y) < 45){ startBattle("king", i); return; }
  }
  if(S.rpg.kings.every(k=>k) && Math.hypot(p.x-DEMON_POS.x, p.y-DEMON_POS.y) < 55){
    startBattle("demon", 0);
  }
}

// ---------- RPG描画 ----------
function drawFx(){
  for(const p of pops){
    ctx.globalAlpha = Math.max(0, 1 - p.age/1.0);
    ctx.fillStyle = p.color; ctx.font = "bold 15px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(p.text, p.x, p.y - p.age*35);
    ctx.globalAlpha = 1;
  }
  for(const c of confs){
    ctx.globalAlpha = Math.max(0, 1 - c.age/c.life);
    ctx.fillStyle = c.color;
    ctx.fillRect(c.x-c.r/2, c.y-c.r/2, c.r, c.r*1.6);
    ctx.globalAlpha = 1;
  }
}
function drawMap(t){
  const g = ctx.createLinearGradient(0, 0, W, 0);
  g.addColorStop(0, "#2e5e35"); g.addColorStop(0.30, "#39684a");
  g.addColorStop(0.40, "#6b87a5"); g.addColorStop(0.68, "#8ea6c2");
  g.addColorStop(0.78, "#4a2a52"); g.addColorStop(1, "#2c1233");
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.font = "24px sans-serif"; ctx.textAlign = "center";
  ctx.fillText("🌲", 60, 250); ctx.fillText("🌼", 150, 160); ctx.fillText("🌳", 260, 100);
  ctx.fillText("⛄", 430, 120); ctx.fillText("❄️", 560, 420); ctx.fillText("🌨️", 620, 100);
  ctx.fillText("🌋", 790, 470); ctx.fillText("💀", 730, 330);
  ctx.fillStyle = "#fff"; ctx.font = "bold 18px sans-serif";
  ctx.fillText("🗺️ 世界を救う旅 〜 ステージをクリックして挑戦 〜", W/2, 36);
  if(S.rpg.demon){
    ctx.fillStyle = "#ffd257"; ctx.font = "bold 15px sans-serif";
    ctx.fillText("🌈 世界は救われた!(再挑戦もできます)", W/2, 60);
  }
  // 経路
  ctx.strokeStyle = "rgba(255,255,255,.55)"; ctx.lineWidth = 5; ctx.setLineDash([2, 12]); ctx.lineCap = "round";
  ctx.beginPath();
  MAP_NODES.forEach((n,i)=>{ i===0 ? ctx.moveTo(n.x,n.y) : ctx.lineTo(n.x,n.y); });
  ctx.stroke(); ctx.setLineDash([]);
  // ノード
  for(let i=0;i<10;i++){
    const n = MAP_NODES[i];
    const cleared = i < S.rpg.stage, unlocked = i <= S.rpg.stage;
    if(i === 9){
      ctx.font = "44px sans-serif"; ctx.textAlign = "center";
      ctx.fillText(S.rpg.demon ? "🏳️" : "🏰", n.x, n.y+14);
      ctx.fillStyle = unlocked ? "#ffd257" : "rgba(255,255,255,.45)";
      ctx.font = "bold 13px sans-serif";
      ctx.fillText(unlocked ? "魔王城(クリックで入る)" : "🔒 魔王城", n.x, n.y+34);
      continue;
    }
    const pulse = (!cleared && unlocked) ? 3+Math.sin(t*4)*2 : 0;
    ctx.fillStyle = cleared ? "#5fe08a" : unlocked ? "#ffd257" : "#4a5674";
    ctx.beginPath(); ctx.arc(n.x, n.y, 17+pulse, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,.35)"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(n.x, n.y, 17+pulse, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = "#1b2230"; ctx.font = "bold 14px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(cleared ? "✓" : (i+1), n.x, n.y+5);
    if(unlocked){
      ctx.fillStyle = "#fff"; ctx.font = "bold 11px sans-serif";
      ctx.fillText(STAGES[i].name, n.x, n.y+34);
    }
  }
  // 主人公トークン
  const cur = MAP_NODES[Math.min(S.rpg.stage, 9)];
  drawPerson(cur.x, cur.y-34+Math.sin(t*3)*3, {scale:0.95, walk:0, isPlayer:true});
  drawFx();
}
function battleTheme(){
  if(!B) return "grass";
  return B.kind==="stage" ? STAGES[B.idx].theme : "castle";
}
function drawBattle(t){
  const th = battleTheme();
  let g = ctx.createLinearGradient(0, 0, 0, H);
  if(th==="grass"){ g.addColorStop(0,"#79b7e8"); g.addColorStop(0.45,"#a5d3f0"); g.addColorStop(0.46,"#3a7d44"); g.addColorStop(1,"#2b5e33"); }
  else if(th==="snow"){ g.addColorStop(0,"#9fc3e8"); g.addColorStop(0.45,"#cfe2f5"); g.addColorStop(0.46,"#e8eef8"); g.addColorStop(1,"#b8cbe0"); }
  else if(th==="dark"){ g.addColorStop(0,"#31123f"); g.addColorStop(0.45,"#471c58"); g.addColorStop(0.46,"#3a1745"); g.addColorStop(1,"#1c0b22"); }
  else { g.addColorStop(0,"#2a2233"); g.addColorStop(0.45,"#3b3247"); g.addColorStop(0.46,"#463a54"); g.addColorStop(1,"#221c2c"); }
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.font = "26px sans-serif"; ctx.textAlign = "center";
  if(th==="grass"){ ctx.fillText("🌳", 90, 180); ctx.fillText("🌼", 830, 440); ctx.fillText("🌿", 480, 470); }
  if(th==="snow"){ ctx.fillText("🌨️", 110, 160); ctx.fillText("⛄", 850, 430); }
  if(th==="dark"){ ctx.fillText("🌋", 120, 440); ctx.fillText("💀", 840, 170); }
  if(th==="castle"){ ctx.fillText("🕯️", 100, 150); ctx.fillText("🕯️", 860, 150); ctx.fillText("🚩", 480, 120); }
  // ステージ名
  ctx.fillStyle = th==="snow" ? "#1b2230" : "#fff"; ctx.font = "bold 17px sans-serif";
  ctx.fillText(B ? (B.kind==="stage" ? `⚔️ ${STAGES[B.idx].name}` : `⚔️ ${B.enemies[0].n}戦`) : "", W/2, 34);
  if(!B){ drawFx(); return; }
  // 敵
  for(const e of B.enemies){
    if(e.hp<=0) continue;
    const im = bossImg(e.imgKey);
    let off = e.size;
    if(im){
      const s2 = e.size*2.8;
      off = s2/2 + 4;
      ctx.save();
      ctx.beginPath(); ctx.arc(e.x, e.y, s2/2, 0, Math.PI*2); ctx.clip();
      ctx.drawImage(im, e.x-s2/2, e.y-s2/2, s2, s2);
      ctx.restore();
      ctx.strokeStyle = "#ffd257"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(e.x, e.y, s2/2, 0, Math.PI*2); ctx.stroke();
    }else{
      ctx.font = `${e.size*2}px sans-serif`; ctx.textAlign = "center";
      ctx.fillText(e.ic, e.x, e.y+e.size*0.7);
    }
    const bw = Math.max(44, e.size*2.4);
    ctx.fillStyle = "rgba(0,0,0,.5)";
    ctx.fillRect(e.x-bw/2, e.y-off-14, bw, 7);
    ctx.fillStyle = "#ff7b7b";
    ctx.fillRect(e.x-bw/2, e.y-off-14, bw*Math.max(0, e.hp/e.maxHp), 7);
    ctx.fillStyle = th==="snow" ? "#1b2230" : "#fff"; ctx.font = "bold 10px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(e.title ? `${e.title} ${e.n}` : e.n, e.x, e.y-off-18);
  }
  // 攻撃範囲サークル(常時うっすら表示)
  const rng = atkRange();
  ctx.strokeStyle = B.slash > 0 ? "rgba(255,255,255,.9)" : "rgba(255,255,255,.22)";
  ctx.lineWidth = B.slash > 0 ? 3.5 : 1.5;
  ctx.setLineDash(B.slash > 0 ? [] : [6, 8]);
  ctx.beginPath(); ctx.arc(player.x, player.y, rng, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  if(B.slash > 0){
    ctx.fillStyle = "rgba(255,255,255,.10)";
    ctx.beginPath(); ctx.arc(player.x, player.y, rng, 0, Math.PI*2); ctx.fill();
  }
  // 敵の弾
  for(const p2 of B.projs){
    ctx.save();
    ctx.translate(p2.x, p2.y);
    ctx.rotate(Math.atan2(p2.vy, p2.vx));
    ctx.font = "16px sans-serif"; ctx.textAlign = "center";
    ctx.fillStyle = "#ffd257";
    ctx.fillText(p2.ic, 0, 6);
    ctx.restore();
  }
  // 主人公+武器
  drawPerson(player.x, player.y, {scale:1.15, walk:player.walk, isPlayer:true});
  const w = curWeapon();
  ctx.font = "18px sans-serif"; ctx.textAlign = "center";
  ctx.fillText(w.ic, player.x+20, player.y-14+(B.slash>0 ? -6 : 0));
  // HPバー
  ctx.fillStyle = "rgba(0,0,0,.55)";
  ctx.beginPath(); ctx.roundRect(14, 50, 240, 30, 8); ctx.fill();
  ctx.fillStyle = "#3a4a66";
  ctx.fillRect(20, 58, 190, 14);
  ctx.fillStyle = B.hp/B.maxHp < 0.3 ? "#ff7b7b" : "#5fe08a";
  ctx.fillRect(20, 58, 190*Math.max(0, B.hp/B.maxHp), 14);
  ctx.fillStyle = "#fff"; ctx.font = "bold 11px sans-serif"; ctx.textAlign = "left";
  ctx.fillText(`HP ${Math.max(0,Math.ceil(B.hp))}/${B.maxHp}`, 22, 76);
  ctx.textAlign = "center";
  // ピンチ演出
  if(B.hp/B.maxHp < 0.3 && !B.over){
    ctx.strokeStyle = `rgba(255,80,80,${0.3+0.3*Math.sin(t*6)})`; ctx.lineWidth = 8;
    ctx.strokeRect(4, 4, W-8, H-8);
  }
  // 勝敗表示
  if(B.over){
    ctx.fillStyle = "rgba(0,0,0,.5)"; ctx.fillRect(0, H/2-50, W, 100);
    ctx.fillStyle = B.over===1 ? "#ffd257" : "#ff7b7b";
    ctx.font = "bold 40px sans-serif";
    ctx.fillText(B.over===1 ? "🎉 勝利!" : "💀 敗北…", W/2, H/2+14);
  }
  drawFx();
}
function drawCastle(t){
  ctx.fillStyle = "#241c30"; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "#2f2540"; ctx.fillRect(0, 260, W, H-260);
  ctx.fillStyle = "rgba(150,40,60,.5)"; ctx.fillRect(W/2-70, 260, 140, H-260);
  for(let x=80; x<W; x+=160){
    ctx.fillStyle = "#3a2f4d"; ctx.fillRect(x-14, 60, 28, 200);
    ctx.font = "20px sans-serif"; ctx.textAlign = "center";
    ctx.globalAlpha = 0.6+0.4*Math.sin(t*5+x);
    ctx.fillText("🔥", x, 70);
    ctx.globalAlpha = 1;
  }
  ctx.fillStyle = "#ffd257"; ctx.font = "bold 20px sans-serif"; ctx.textAlign = "center";
  ctx.fillText("🏰 魔王城", W/2, 40);
  // 四天王
  for(let i=0;i<4;i++){
    const k = KING_POS[i], defeated = S.rpg.kings[i];
    const im = bossImg(KINGS[i].imgKey);
    ctx.save();
    if(defeated) ctx.filter = "grayscale(1)";
    ctx.globalAlpha = defeated ? 0.55 : 1;
    if(im){
      ctx.beginPath(); ctx.arc(k.x, k.y, 36, 0, Math.PI*2); ctx.clip();
      ctx.drawImage(im, k.x-36, k.y-36, 72, 72);
    }else{
      ctx.font = "44px sans-serif"; ctx.textAlign = "center";
      ctx.fillText(KINGS[i].ic, k.x, k.y+14);
    }
    ctx.restore();
    ctx.strokeStyle = defeated ? "rgba(255,255,255,.3)" : "#ffd257"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(k.x, k.y, 36, 0, Math.PI*2); ctx.stroke();
    if(defeated){
      ctx.font = "26px sans-serif"; ctx.textAlign = "center";
      ctx.fillText("💀", k.x+27, k.y-22);
    }
    ctx.fillStyle = defeated ? "rgba(255,255,255,.45)" : "rgba(255,210,87,.9)";
    ctx.font = "10px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(`「${KINGS[i].title}」`, k.x, k.y+52);
    ctx.fillStyle = defeated ? "rgba(255,255,255,.45)" : "#fff";
    ctx.font = "bold 13px sans-serif";
    ctx.fillText(`四天王 ${KINGS[i].n}${defeated ? "(撃破済)" : ""}`, k.x, k.y+68);
  }
  // 魔王
  if(S.rpg.kings.every(k=>k)){
    const pulse = 1 + Math.sin(t*3)*0.06;
    const im = bossImg(DEMON.imgKey);
    const r = 52*pulse;
    if(!S.rpg.demon){
      const ag = ctx.createRadialGradient(DEMON_POS.x, DEMON_POS.y, r*0.5, DEMON_POS.x, DEMON_POS.y, r*1.9);
      ag.addColorStop(0, "rgba(200,40,80,.4)"); ag.addColorStop(1, "rgba(200,40,80,0)");
      ctx.fillStyle = ag;
      ctx.beginPath(); ctx.arc(DEMON_POS.x, DEMON_POS.y, r*1.9, 0, Math.PI*2); ctx.fill();
    }
    ctx.save();
    if(S.rpg.demon) ctx.filter = "grayscale(1)";
    if(im){
      ctx.beginPath(); ctx.arc(DEMON_POS.x, DEMON_POS.y, r, 0, Math.PI*2); ctx.clip();
      ctx.drawImage(im, DEMON_POS.x-r, DEMON_POS.y-r, r*2, r*2);
    }else{
      ctx.font = "70px sans-serif"; ctx.textAlign = "center";
      ctx.fillText(S.rpg.demon ? "💀" : "👿", DEMON_POS.x, DEMON_POS.y+24);
    }
    ctx.restore();
    ctx.strokeStyle = S.rpg.demon ? "rgba(255,255,255,.3)" : "#ff5a7a"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(DEMON_POS.x, DEMON_POS.y, r, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = "rgba(255,210,87,.9)"; ctx.font = "11px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(`「${DEMON.title}」`, DEMON_POS.x, DEMON_POS.y+r+18);
    ctx.fillStyle = "#ffd257"; ctx.font = "bold 15px sans-serif";
    ctx.fillText(S.rpg.demon ? `👑 魔王 ${DEMON.n}(討伐済・クリックで再戦)` : `👿 魔王 ${DEMON.n} が現れた!クリックで最終決戦!!`, DEMON_POS.x, DEMON_POS.y+r+36);
  }else{
    ctx.fillStyle = "rgba(255,255,255,.6)"; ctx.font = "13px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("…四天王を全員倒すと、奥から魔王が現れるようだ", DEMON_POS.x, DEMON_POS.y+20);
  }
  drawFx();
}

// ---------- メインループ ----------
let lastT = performance.now();
let saveTimer = 0, hudTimer = 0;
function frame(now){
  const dt = Math.min((now-lastT)/1000, 0.1);
  lastT = now;
  const t = now/1000;
  tick(dt, t);
  draw(t);
  hudTimer -= dt;
  if(hudTimer<=0){ updateHud(); hudTimer = 0.25; }
  saveTimer += dt;
  if(saveTimer > 10){ save(); saveTimer = 0; }
  requestAnimationFrame(frame);
}

// タブが裏に回っている間も生産・実績を進める(描画はしない)
setInterval(()=>{
  if(!document.hidden) return;
  const now = performance.now();
  const dt = Math.min((now-lastT)/1000, 2);
  lastT = now;
  if(dt > 0) tick(dt, now/1000);
  saveTimer += dt;
  if(saveTimer > 10){ save(); saveTimer = 0; }
}, 1000);

// ---------- キャンバスサイズ ----------
function fit(){
  cv.width = W; cv.height = H;
  const wrap = $$("wrap");
  const r = wrap.getBoundingClientRect();
  const s = Math.min(r.width/W, r.height/H);
  cv.style.width = W*s + "px";
  cv.style.height = H*s + "px";
  cv.style.margin = "0 auto";
}
addEventListener("resize", fit);

// ---------- 起動 ----------
const loaded = load();
if(loaded){
  S = loaded;
  applyOffline();
  toast("💾 前回の続きからスタート!");
}else{
  S = newState();
  toast("🏭 工場で稼いで、⚔️ 装備を買って、🌍 世界を救おう!");
}
resetActors();
fit();
updateHud();
setMode("title");
addEventListener("beforeunload", save);
document.addEventListener("visibilitychange", ()=>{ if(document.hidden) save(); });
requestAnimationFrame(frame);
</script>
