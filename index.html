<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ファクトリー・タイクーン</title>
<style>
  :root{
    --bg:#1b2230; --panel:#232d40; --panel2:#2c3850; --line:#3d4c6b;
    --text:#e8eefb; --sub:#9fb0cc; --gold:#ffd257; --green:#5fe08a; --red:#ff7b7b; --blue:#5ab0ff;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif;
    display:flex; flex-direction:column; align-items:center; overflow:hidden;
  }
  #hud{
    width:100%; max-width:980px; display:flex; align-items:center; gap:10px;
    padding:8px 10px; flex-wrap:wrap;
  }
  #avatar{
    width:52px; height:52px; border-radius:12px; border:2px solid var(--gold);
    object-fit:cover; flex-shrink:0;
  }
  #moneyBox{flex:1; min-width:180px;}
  #money{font-size:26px; font-weight:800; color:var(--gold); line-height:1.1; white-space:nowrap;}
  #subInfo{font-size:12px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .hudBtn{
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:10px; padding:9px 12px; font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap;
  }
  .hudBtn:hover{background:#37476a;}
  #wrap{position:relative; width:100%; max-width:980px; flex:1; min-height:0;}
  canvas{
    display:block; width:100%; height:100%;
    border-radius:12px; touch-action:none; background:#11161f;
  }
  #help{
    width:100%; max-width:980px; padding:6px 10px 10px; font-size:12px; color:var(--sub); text-align:center;
  }
  /* ---- modal ---- */
  #overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
    align-items:center; justify-content:center; z-index:20; padding:14px;
  }
  #overlay.show{display:flex;}
  #modal{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    width:100%; max-width:460px; max-height:86vh; overflow-y:auto; padding:16px;
  }
  #modal h2{font-size:18px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;}
  #modal h2 .x{cursor:pointer; color:var(--sub); font-size:22px; padding:0 6px;}
  .item{
    background:var(--panel2); border:1px solid var(--line); border-radius:10px;
    padding:10px 12px; margin-bottom:8px; display:flex; align-items:center; gap:10px;
  }
  .item.done{border-color:var(--gold); background:#33395022;}
  .item.locked{opacity:.55;}
  .item .ic{font-size:26px; width:34px; text-align:center; flex-shrink:0;}
  .item .info{flex:1; min-width:0;}
  .item .nm{font-weight:700; font-size:14px;}
  .item .ds{font-size:12px; color:var(--sub);}
  .buy{
    background:var(--green); color:#0d2417; border:none; border-radius:8px;
    padding:8px 12px; font-weight:800; font-size:13px; cursor:pointer; white-space:nowrap; flex-shrink:0;
  }
  .buy.no{background:#4a5674; color:#8b97b4; cursor:not-allowed;}
  .buy.danger{background:var(--red); color:#3a0d0d;}
  .buy.gold{background:var(--gold); color:#4a3708;}
  textarea{
    width:100%; height:90px; background:#161d2b; color:var(--text);
    border:1px solid var(--line); border-radius:8px; padding:8px; font-size:12px; resize:vertical;
  }
  .row{display:flex; gap:8px; margin-top:8px;}
  .row .buy{flex:1;}
  #toasts{
    position:fixed; left:50%; top:74px; transform:translateX(-50%);
    z-index:30; display:flex; flex-direction:column; gap:6px; pointer-events:none; align-items:center;
  }
  .toast{
    background:rgba(20,28,44,.92); border:1px solid var(--line); color:var(--text);
    border-radius:10px; padding:8px 16px; font-size:13px; font-weight:700;
    animation:pop .25s ease, fade .5s ease 2.4s forwards; white-space:nowrap;
  }
  .toast.gold{
    background:linear-gradient(135deg,#4a3b10,#6b5518); border-color:var(--gold); color:var(--gold);
    font-size:15px; padding:12px 22px; box-shadow:0 0 24px rgba(255,210,87,.35);
    animation:pop .25s ease, fade .6s ease 3.6s forwards;
  }
  @keyframes pop{from{transform:translateY(-8px) scale(.9); opacity:0;}}
  @keyframes fade{to{opacity:0;}}
</style>
</head>

// ---------- 状態 ----------
let S = null;
function newState(){
  return {
    money: 200,
    totalEarned: 0,
    slots: Array(SLOT_N).fill(null), // {t, lv, buf, timer}
    capLv: 1, spdLv: 1,
    workers: 0,
    carryN: 0, carryV: 0,
    facLv: 1,
    ach: {},
    stats: {itemsSold: 0},
    last: Date.now(),
  };
}
function migrate(s){
  if(!s.facLv){
    let hi = -1;
    s.slots.forEach((m,i)=>{ if(m) hi = i; });
    s.facLv = 1;
    while(s.facLv < FAC_MAX && FAC[s.facLv].slots < hi+1) s.facLv++;
  }
  while(s.slots.length < SLOT_N) s.slots.push(null);
  if(!s.ach) s.ach = {};
  if(!s.stats) s.stats = {itemsSold:0};
  if(s.stats.itemsSold == null) s.stats.itemsSold = 0;
  return s;
}
function facSlots(){ return FAC[S.facLv].slots; }
function machineVal(m){ return Math.round(TYPES[m.t].val * Math.pow(1.25, m.lv-1)); }
function machineItv(m){ return TYPES[m.t].itv * Math.pow(0.97, m.lv-1); }
function machineUpCost(m){ return Math.round(TYPES[m.t].cost * 0.6 * Math.pow(1.55, m.lv)); }
function typeCost(t){
  const owned = S.slots.filter(s=>s && s.t===t).length;
  return Math.round(TYPES[t].cost * Math.pow(1.18, owned));
}
function capMax(){ return 15 + (S.capLv-1)*10; }
function capUpCost(){ return Math.round(250 * Math.pow(1.9, S.capLv-1)); }
function playerSpd(){ return 170 * (1 + (S.spdLv-1)*0.10); }
function spdUpCost(){ return Math.round(350 * Math.pow(1.9, S.spdLv-1)); }
function workerCost(){ return Math.round(1200 * Math.pow(2.1, S.workers)); }
function achCount(){ return Object.keys(S.ach).length; }

// ---------- セーブ / ロード ----------
function save(){
  S.last = Date.now();
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }catch(e){}
}
function load(){
  try{
    const j = localStorage.getItem(SAVE_KEY);
    if(!j) return null;
    const s = JSON.parse(j);
    if(!s || !Array.isArray(s.slots)) return null;
    return migrate(s);
  }catch(e){ return null; }
}
function exportCode(){
  S.last = Date.now();
  return "FT1." + btoa(unescape(encodeURIComponent(JSON.stringify(S))));
}
function importCode(code){
  try{
    code = code.trim();
    if(!code.startsWith("FT1.")) return false;
    const s = JSON.parse(decodeURIComponent(escape(atob(code.slice(4)))));
    if(!s || !Array.isArray(s.slots)) return false;
    S = migrate(s);
    applyOffline();
    resetActors();
    save();
    return true;
  }catch(e){ return false; }
}

// オフライン(閉じている間)の生産
function applyOffline(){
  const dt = Math.min(Math.max((Date.now() - (S.last||Date.now()))/1000, 0), 8*3600); // 最大8時間
  if(dt < 5) return;
  let workerSold = 0;
  for(const m of S.slots){
    if(!m) continue;
    const produced = dt / machineItv(m);
    const cap = TYPES[m.t].buf;
    const fit = Math.min(produced, cap - m.buf);
    m.buf = Math.floor(Math.min(cap, m.buf + produced));
    if(S.workers > 0){
      const overflow = Math.max(0, produced - fit);
      workerSold += overflow * machineVal(m) * 0.5 * Math.min(1, S.workers/3);
    }
  }
  workerSold = Math.floor(workerSold);
  if(workerSold > 0){ S.money += workerSold; S.totalEarned += workerSold; }
  const mins = Math.floor(dt/60);
  if(mins >= 1){
    toast(`⏰ おかえりなさい! ${mins}分間の生産が溜まっています` + (workerSold>0 ? `(作業員が ¥${fmt(workerSold)} 出荷済み)` : ""));
  }
}

}

let achTimer = 0;
function checkAch(){
  const c = {
    machines: S.slots.filter(Boolean).length,
    types: new Set(S.slots.filter(Boolean).map(m=>m.t)).size,
    maxLv: Math.max(0, ...S.slots.filter(Boolean).map(m=>m.lv)),
  };
  for(const a of ACH){
    if(S.ach[a.id]) continue;
    if(a.cond(c)){
      S.ach[a.id] = true;
      S.money += a.reward;
      toast(`🏆 実績解除「${a.name}」 +¥${fmt(a.reward)}`, true);

      save();
    }
  }
}

function shopHtml(){

  h += `<div class="item"><div class="ic">🎒</div><div class="info"><div class="nm">運搬キャパ Lv${S.capLv}</div><div class="ds">一度に運べる数 ${capMax()} → ${capMax()+10}</div></div><button class="buy ${S.money>=capUpCost()?"":"no"}" onclick="buyCap()">¥${fmt(capUpCost())}</button></div>`;

  const empty = S.slots.findIndex((s,i)=>!s && i<facSlots());
  TYPES.forEach((tp,t)=>{

    const ok = S.money>=c && empty>=0;

  return h;

function refreshShop(){ if(overlay.classList.contains("show") && modal.querySelector("h2")?.textContent.includes("ショップ")) modal.innerHTML = shopHtml(); }

function openAch(){
  let h = `<h2>🏆 実績 (${achCount()}/${ACH.length}) <span class="x" onclick="closeModal()">✕</span></h2>`;
  const sorted = [...ACH].sort((a,b)=>(S.ach[b.id]?1:0)-(S.ach[a.id]?1:0));
  for(const a of sorted){
    const got = !!S.ach[a.id];
    h += `<div class="item ${got?"done":"locked"}"><div class="ic">${got?a.ic:"🔒"}</div><div class="info"><div class="nm">${a.name} ${got?"✅":""}</div><div class="ds">${a.desc}(報酬 ¥${fmt(a.reward)})</div></div></div>`;
  }
  openModal(h);
}

window.buyExpand = function(){
  if(S.facLv >= FAC_MAX) return;
  const nx = FAC[S.facLv+1];
  if(S.money < nx.cost) return;
  S.money -= nx.cost;
  S.facLv++;
  toast(`🏗️ 工場を拡張!「${FAC[S.facLv].name}」になった!`, true);
  confetti(W/2, H/2, 120);
  save(); refreshShop(); updateHud();
};
window.buyCap = function(){ const c=capUpCost(); if(S.money<c) return; S.money-=c; S.capLv++; toast("🎒 運搬キャパUP!"); save(); refreshShop(); updateHud(); };
window.buySpd = function(){ const c=spdUpCost(); if(S.money<c) return; S.money-=c; S.spdLv++; toast("👟 スピードUP!"); save(); refreshShop(); updateHud(); };
window.buyWorker = function(){ const c=workerCost(); if(S.money<c) return; S.money-=c; S.workers++; spawnWorker(S.workers); toast("👷 作業員を雇った!"); save(); refreshShop(); updateHud(); };
window.buyMachine = function(t, slot){
  if(slot<0 || slot>=facSlots() || S.slots[slot]) slot = S.slots.findIndex((s,i)=>!s && i<facSlots());
  if(slot<0) return;
  const c = typeCost(t);
  if(S.money<c) return;
  S.money -= c;
  S.slots[slot] = {t, lv:1, buf:0, timer:0};
  toast(`${TYPES[t].ic} ${TYPES[t].name}を設置!`);
  save(); closeModal(); updateHud();
};
window.upgradeMachine = function(i){
  const m = S.slots[i]; if(!m) return;
  const c = machineUpCost(m);
  if(S.money<c) return;
  S.money -= c; m.lv++;
  toast(`⬆️ ${TYPES[m.t].name} Lv${m.lv}!`);
  save(); openSlotMenu(i); updateHud();
};
window.sellMachine = function(i){
  const m = S.slots[i]; if(!m) return;
  const back = Math.round(typeCost(m.t)*0.5);
  S.money += back;
  S.slots[i] = null;
  toast(`💥 撤去して ¥${fmt(back)} 回収`);
  save(); closeModal(); updateHud();
};
window.closeModal = closeModal;

function openSlotMenu(i){
  if(i >= facSlots()){
    // ロック中スロット → 拡張のおすすめ
    let h = `<h2>🔒 ロック中のスロット <span class="x" onclick="closeModal()">✕</span></h2>`;
    h += `<div class="ds" style="color:var(--sub); margin-bottom:10px;">工場を拡張するとこのスロットが使えるようになり、内装も豪華になります。</div>`;
    h += expandItemHtml();
    openModal(h);
    return;
  }
  const m = S.slots[i];
  if(!m){
    let h = `<h2>🏗️ マシンを設置 <span class="x" onclick="closeModal()">✕</span></h2>`;
    TYPES.forEach((tp,t)=>{
      const c = typeCost(t);
      h += `<div class="item"><div class="ic">${tp.ic}</div><div class="info"><div class="nm">${tp.name}</div><div class="ds">¥${fmt(tp.val)}/個・${tp.itv}秒ごと・貯蔵${tp.buf}個</div></div><button class="buy ${S.money>=c?"":"no"}" onclick="buyMachine(${t},${i})">¥${fmt(c)}</button></div>`;
    });
    openModal(h);
    return;
  }
  const tp = TYPES[m.t];
  let h = `<h2>${tp.ic} ${tp.name} Lv${m.lv} <span class="x" onclick="closeModal()">✕</span></h2>`;
  h += `<div class="ds" style="margin-bottom:10px; color:var(--sub);">1個 ¥${fmt(machineVal(m))} / ${machineItv(m).toFixed(1)}秒ごとに生産 / 貯蔵 ${Math.floor(m.buf)}/${tp.buf}個</div>`;
  h += `<div class="item"><div class="ic">⬆️</div><div class="info"><div class="nm">レベルアップ</div><div class="ds">単価 +25%・生産スピードUP</div></div><button class="buy ${S.money>=machineUpCost(m)?"":"no"}" onclick="upgradeMachine(${i})">¥${fmt(machineUpCost(m))}</button></div>`;
  h += `<div class="item"><div class="ic">💥</div><div class="info"><div class="nm">撤去する</div><div class="ds">半額が戻ってきます</div></div><button class="buy danger" onclick="sellMachine(${i})">撤去</button></div>`;
  openModal(h);
}

window.doExport = function(){
  const ta = $$("saveCode");
  ta.value = exportCode();
  ta.select();
  try{ document.execCommand("copy"); toast("📋 コードをコピーしました"); }
  catch(e){ toast("📤 コードを発行しました(手動でコピーしてください)"); }
  if(navigator.clipboard) navigator.clipboard.writeText(ta.value).catch(()=>{});
};
window.doImport = function(){
  if(importCode($$("saveCode").value)){ toast("✅ セーブデータを読み込みました!"); closeModal(); updateHud(); }
  else toast("❌ コードが正しくありません");
};
window.doManualSave = function(){ save(); toast("💾 セーブしました"); };
window.doReset = function(){
  if(!confirm("本当に最初からやり直しますか?\n(今のデータは消えます)")) return;
  S = newState(); resetActors(); save(); closeModal(); updateHud();

const cv = $$("cv"), ctx = cv.getContext("2d");
function canvasPos(e){
  const r = cv.getBoundingClientRect();
  const p = e.touches ? e.touches[0] : e;
  return { x:(p.clientX-r.left)/r.width*W, y:(p.clientY-r.top)/r.height*H };
}
function onTap(e){
  if(overlay.classList.contains("show")) return;
  const p = canvasPos(e);
  for(let i=0;i<SLOT_N;i++){
    const s = SLOT_POS[i];
    if(Math.abs(p.x-s.x)<50 && Math.abs(p.y-s.y)<50){
      openSlotMenu(i);
      return;
    }
  }
  player.tx = Math.max(30, Math.min(W-90, p.x));
  player.ty = Math.max(50, Math.min(H-30, p.y));
  e.preventDefault();
}
cv.addEventListener("mousedown", onTap);
cv.addEventListener("touchstart", onTap, {passive:false});

// ---------- 紙吹雪 ----------
const confs = [];
function confetti(x, y, n){
  const colors = ["#ffd257","#5fe08a","#5ab0ff","#ff7b7b","#d65ad6","#fff"];
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, sp = 60+Math.random()*220;
    confs.push({x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-120, color:colors[i%colors.length], age:0, life:1.2+Math.random()*0.8, r:2+Math.random()*3});
  }
}

// ---------- 人物の描画(黄ヘルメット+青ポロシャツ) ----------
function drawPerson(x, y, opts){
  const {shirt="#2f7fd4", scale=1, walk=0, isPlayer=false} = opts;
  const hm = opts.helmet || "#f5c542";
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  const bob = Math.sin(walk*10)*1.5;
  ctx.fillStyle = "rgba(0,0,0,.30)";
  ctx.beginPath(); ctx.ellipse(0, 20, 13, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.translate(0, bob);
  const lw = Math.sin(walk*10)*4;
  ctx.strokeStyle = "#26324a"; ctx.lineWidth = 5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(-4, 6); ctx.lineTo(-4+lw, 18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4, 6); ctx.lineTo(4-lw, 18); ctx.stroke();
  ctx.fillStyle = shirt;
  ctx.beginPath();
  ctx.moveTo(-10, -6); ctx.quadraticCurveTo(-12, 8, -7, 10);
  ctx.lineTo(7, 10); ctx.quadraticCurveTo(12, 8, 10, -6);
  ctx.quadraticCurveTo(0, -11, -10, -6); ctx.fill();
  ctx.fillStyle = "#1f5fa8";
  ctx.beginPath(); ctx.moveTo(-5,-8); ctx.lineTo(0,-3); ctx.lineTo(5,-8); ctx.lineTo(0,-9); ctx.fill();
  ctx.strokeStyle = shirt; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(-10, -4); ctx.lineTo(-13, 6-lw*0.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10, -4); ctx.lineTo(13, 6+lw*0.5); ctx.stroke();
  ctx.fillStyle = "#f6d7b8";
  ctx.beginPath(); ctx.arc(0, -18, 9, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#20242c";
  ctx.beginPath(); ctx.arc(0, -19, 9, Math.PI*0.95, Math.PI*2.05); ctx.fill();
  ctx.fillStyle = hm;
  ctx.beginPath(); ctx.arc(0, -22, 10, Math.PI, Math.PI*2); ctx.fill();
  ctx.fillRect(-11, -23, 22, 3.5);
  ctx.fillStyle = "rgba(255,255,255,.35)";
  ctx.beginPath(); ctx.arc(-3, -25, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#20242c";
  ctx.beginPath(); ctx.arc(-3.2, -17, 1.3, 0, Math.PI*2); ctx.arc(3.2, -17, 1.3, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "#c98"; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(0, -14.5, 2.5, 0.2, Math.PI-0.2); ctx.stroke();
  if(isPlayer){
    ctx.fillStyle = "#ffd257";
    ctx.beginPath();
    ctx.moveTo(0, -40); ctx.lineTo(-5, -48); ctx.lineTo(5, -48); ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

// ---------- 内装(レベルで豪華に) ----------
function drawDeco(t){
  const lv = S.facLv;
  const fac = FAC[lv];
  // 上部の壁
  ctx.fillStyle = fac.wall;
  ctx.fillRect(0, 0, W, 34);
  ctx.fillStyle = "rgba(0,0,0,.25)";
  ctx.fillRect(0, 34, W, 5);
  // Lv2+ : 窓
  if(lv>=2){
    for(let x=50; x<W-120; x+=170){
      const g = ctx.createLinearGradient(x, 4, x, 28);
      g.addColorStop(0, "#bfe3ff"); g.addColorStop(1, "#7db9e8");
      ctx.fillStyle = g;
      ctx.fillRect(x, 5, 80, 24);
      ctx.strokeStyle = "rgba(0,0,0,.3)"; ctx.lineWidth = 2;
      ctx.strokeRect(x, 5, 80, 24);
      ctx.beginPath(); ctx.moveTo(x+40, 5); ctx.lineTo(x+40, 29); ctx.stroke();
    }
  }
  // Lv2+ : 観葉植物
  if(lv>=2){
    ctx.font = "26px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("🪴", 28, 80);
    ctx.fillText("🪴", 28, 520);
  }
  // Lv3+ : 社名バナー & 天井ライト
  if(lv>=3){
    ctx.fillStyle = "#1a2438";
    ctx.beginPath(); ctx.roundRect(W/2-150, 42, 300, 26, 8); ctx.fill();
    ctx.strokeStyle = "rgba(255,210,87,.6)"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(W/2-150, 42, 300, 26, 8); ctx.stroke();
    ctx.fillStyle = "#ffd257"; ctx.font = "bold 15px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("⚙️ SUPER FACTORY ⚙️", W/2, 60);
    for(let x=160; x<W-100; x+=320){
      const g = ctx.createRadialGradient(x, 40, 0, x, 40, 130);
      g.addColorStop(0, "rgba(255,244,200,.13)"); g.addColorStop(1, "rgba(255,244,200,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(x, 40, 130, 0, Math.PI*2); ctx.fill();
    }
  }
  // Lv4+ : レッドカーペット(出荷口まで)
  if(lv>=4){
    ctx.fillStyle = "rgba(178,48,66,.45)";
    ctx.fillRect(60, 258, DOCK.x-70, 34);
    ctx.fillStyle = "rgba(255,210,87,.5)";
    ctx.fillRect(60, 256, DOCK.x-70, 3);
    ctx.fillRect(60, 292, DOCK.x-70, 3);
  }else{
    ctx.strokeStyle = "rgba(255,210,87,.15)"; ctx.lineWidth = 2; ctx.setLineDash([14,10]);
    ctx.beginPath(); ctx.moveTo(40, 275); ctx.lineTo(DOCK.x-10, 275); ctx.stroke();
    ctx.setLineDash([]);
  }
  // Lv5 : 金の縁取り・トロフィー・輝き
  if(lv>=5){
    ctx.strokeStyle = "rgba(255,210,87,.55)"; ctx.lineWidth = 5;
    ctx.strokeRect(4, 4, W-8, H-8);
    ctx.font = "30px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("🏆", W-40, 90);
    ctx.fillText("💎", W-40, 500);
    for(let i=0;i<5;i++){
      const sx = 120 + i*180, sy = 90;
      const tw = (Math.sin(t*3 + i*1.7)+1)/2;
      ctx.globalAlpha = 0.25 + tw*0.6;
      ctx.fillStyle = "#fff2b0"; ctx.font = "14px sans-serif";
      ctx.fillText("✦", sx, sy);
      ctx.globalAlpha = 1;
    }
  }
}

// ---------- ワールド描画 ----------
function draw(t){
  ctx.clearRect(0,0,W,H);
  const fac = FAC[S.facLv];
  for(let y=0;y<H;y+=60){
    for(let x=0;x<W;x+=60){
      ctx.fillStyle = ((x+y)/60)%2 ? fac.floor[0] : fac.floor[1];
      ctx.fillRect(x,y,60,60);
    }
  }
  drawDeco(t);

  // 出荷口
  ctx.fillStyle = S.facLv>=5 ? "#4a4020" : "#31405e";
  ctx.fillRect(DOCK.x, DOCK.y-DOCK.h/2, DOCK.w, DOCK.h);
  ctx.fillStyle = "#ffd257";
  for(let i=0;i<4;i++){
    ctx.fillRect(DOCK.x, DOCK.y-DOCK.h/2 + 8 + i*38, 8, 22);
  }
  ctx.save();
  ctx.translate(DOCK.x+38, DOCK.y);
  ctx.rotate(-Math.PI/2);
  ctx.fillStyle = "#ffd257"; ctx.font = "bold 16px sans-serif"; ctx.textAlign="center";
  ctx.fillText("🚚 出荷口", 0, 0);
  ctx.restore();

  // マシンスロット
  for(let i=0;i<SLOT_N;i++){
    const p = SLOT_POS[i], m = S.slots[i];
    if(i >= facSlots()){
      ctx.fillStyle = "rgba(10,14,22,.45)";
      ctx.beginPath(); ctx.roundRect(p.x-45, p.y-40, 90, 80, 8); ctx.fill();
      ctx.strokeStyle = "rgba(159,176,204,.25)"; ctx.lineWidth = 2;
      ctx.strokeRect(p.x-45, p.y-40, 90, 80);
      ctx.font = "22px sans-serif"; ctx.textAlign = "center";
      ctx.fillText("🔒", p.x, p.y+2);
      ctx.fillStyle = "rgba(159,176,204,.55)"; ctx.font = "10px sans-serif";
      ctx.fillText("拡張で解放", p.x, p.y+22);
      continue;
    }
    if(!m){
      ctx.strokeStyle = "rgba(159,176,204,.4)"; ctx.lineWidth = 2; ctx.setLineDash([6,6]);
      ctx.strokeRect(p.x-45, p.y-40, 90, 80);
      ctx.setLineDash([]);
      ctx.fillStyle = "rgba(159,176,204,.5)";
      ctx.font = "13px sans-serif"; ctx.textAlign = "center";
      ctx.fillText("＋ 空きスロット", p.x, p.y+4);
      continue;
    }
    const tp = TYPES[m.t];
    ctx.fillStyle = tp.color;
    ctx.beginPath(); ctx.roundRect(p.x-45, p.y-40, 90, 68, 8); ctx.fill();
    ctx.fillStyle = "rgba(0,0,0,.25)";
    ctx.beginPath(); ctx.roundRect(p.x-45, p.y+8, 90, 20, 6); ctx.fill();
    const shake = m.buf < tp.buf ? Math.sin(t*8+i)*2 : 0;
    ctx.font = "30px sans-serif"; ctx.textAlign="center";
    ctx.fillText(tp.ic, p.x, p.y-4+shake);
    ctx.fillStyle = "#fff"; ctx.font = "bold 11px sans-serif";
    ctx.fillText(`${tp.name} Lv${m.lv}`, p.x, p.y+22);
    const ratio = m.buf/tp.buf;
    ctx.fillStyle = "rgba(0,0,0,.4)";
    ctx.fillRect(p.x-40, p.y-52, 80, 9);
    ctx.fillStyle = ratio>=1 ? "#ff7b7b" : "#5fe08a";
    ctx.fillRect(p.x-40, p.y-52, 80*ratio, 9);
    ctx.fillStyle = "#fff"; ctx.font = "9px sans-serif";
    ctx.fillText(`${Math.floor(m.buf)}/${tp.buf}`, p.x, p.y-44.5);
    if(ratio>=1){
      ctx.fillStyle = "#ff7b7b"; ctx.font = "bold 11px sans-serif";
      ctx.fillText("満杯!", p.x+55, p.y-44);
    }
  }

  // 作業員
  for(const w of workers){
    drawPerson(w.x, w.y, {shirt:"#4a9e5f", helmet:"#e8e8e8", scale:0.85, walk:w.walk});
    if(w.carryN>0){
      ctx.font="12px sans-serif"; ctx.textAlign="center";
      ctx.fillText("📦", w.x+12, w.y-24);
    }
  }
  // プレイヤー
  drawPerson(player.x, player.y, {shirt:"#2f7fd4", helmet:"#f5c542", scale:1.15, walk:player.walk, isPlayer:true});
  if(S.carryN>0){
    ctx.font = "14px sans-serif"; ctx.textAlign="center";
    ctx.fillText("📦", player.x+15, player.y-30);
    ctx.fillStyle = "#ffd257"; ctx.font = "bold 11px sans-serif";
    ctx.fillText(`${S.carryN}個 ¥${fmt(S.carryV)}`, player.x, player.y-46);
  }

  // 収益ポップ
  for(const p of pops){
    ctx.globalAlpha = Math.max(0, 1 - p.age/1.0);
    ctx.fillStyle = p.color; ctx.font = "bold 15px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(p.text, p.x, p.y - p.age*35);
    ctx.globalAlpha = 1;
  }
  // 紙吹雪
  for(const c of confs){
    ctx.globalAlpha = Math.max(0, 1 - c.age/c.life);
    ctx.fillStyle = c.color;
    ctx.fillRect(c.x-c.r/2, c.y-c.r/2, c.r, c.r*1.6);
    ctx.globalAlpha = 1;
  }
}
const pops = [];
function pop(x, y, text, color){ pops.push({x, y, text, color, age:0}); }

// ---------- ゲームロジック ----------
let collectCd = 0;
function moveToward(o, spd, dt){
  const dx = o.tx - o.x, dy = o.ty - o.y;
  const d = Math.hypot(dx, dy);
  if(d < 3){ o.walk = 0; return true; }
  const step = Math.min(spd*dt, d);
  o.x += dx/d*step; o.y += dy/d*step;
  o.walk += dt;
  return false;
}

function tick(dt, t){
  // 生産
  for(const m of S.slots){
    if(!m) continue;
    const cap = TYPES[m.t].buf;
    if(m.buf >= cap) continue;
    m.timer += dt;
    const itv = machineItv(m);
    while(m.timer >= itv && m.buf < cap){ m.timer -= itv; m.buf++; }
  }

  // プレイヤー移動
  let kx=0, ky=0;
  if(keys["a"]||keys["arrowleft"]) kx--;
  if(keys["d"]||keys["arrowright"]) kx++;
  if(keys["w"]||keys["arrowup"]) ky--;
  if(keys["s"]||keys["arrowdown"]) ky++;
  if(kx||ky){
    const n = Math.hypot(kx,ky);
    player.x = Math.max(30, Math.min(W-30, player.x + kx/n*playerSpd()*dt));
    player.y = Math.max(50, Math.min(H-30, player.y + ky/n*playerSpd()*dt));
    player.tx = player.x; player.ty = player.y;
    player.walk += dt;
  }else{
    moveToward(player, playerSpd(), dt);
  }

  // 回収(近接・自動)
  collectCd -= dt;
  if(collectCd <= 0){
    for(let i=0;i<facSlots();i++){
      const m = S.slots[i];
      if(!m || m.buf < 1) continue;
      const p = SLOT_POS[i];
      if(Math.hypot(player.x-p.x, player.y-p.y) < 75 && S.carryN < capMax()){
        const n = Math.min(Math.floor(m.buf), capMax()-S.carryN);
        if(n>0){
          m.buf -= n;
          S.carryN += n;
          S.carryV += n * machineVal(m);
          pop(p.x, p.y-60, `+${n}個`, "#5ab0ff");
          collectCd = 0.35;
        }
      }
    }
  }
  // 売却(出荷口・自動)
  if(S.carryN>0 && player.x > DOCK.x-55 && Math.abs(player.y-DOCK.y) < DOCK.h/2+30){
    S.money += S.carryV;
    S.totalEarned += S.carryV;
    S.stats.itemsSold += S.carryN;
    pop(DOCK.x-30, DOCK.y-40, `+¥${fmt(S.carryV)}`, "#5fe08a");
    S.carryN = 0; S.carryV = 0;
  }

  // 作業員AI
  for(const w of workers){
    w.wait -= dt;
    if(w.state==="idle"){
      if(w.wait>0) continue;
      let best=-1, bestBuf=0.9;
      for(let i=0;i<facSlots();i++){
        const m = S.slots[i];
        if(m && m.buf > bestBuf){ best=i; bestBuf=m.buf; }
      }
      if(best>=0){
        w.slot = best;
        w.tx = SLOT_POS[best].x + 30; w.ty = SLOT_POS[best].y + 45;
        w.state = "go";
      }else w.wait = 0.8;
    }else if(w.state==="go"){
      if(moveToward(w, 110, dt)){
        const m = S.slots[w.slot];
        if(m && m.buf>=1){
          const n = Math.min(Math.floor(m.buf), 8);
          m.buf -= n;
          w.carryN = n; w.carryV = n*machineVal(m);
        }
        w.tx = DOCK.x - 30; w.ty = DOCK.y + (Math.random()*80-40);
        w.state = "dock";
      }
    }else if(w.state==="dock"){
      if(moveToward(w, 110, dt)){
        if(w.carryN>0){
          S.money += w.carryV; S.totalEarned += w.carryV;
          S.stats.itemsSold += w.carryN;
          pop(w.x, w.y-30, `+¥${fmt(w.carryV)}`, "#9fe0a0");
        }
        w.carryN=0; w.carryV=0;
        w.state = "idle"; w.wait = 0.4;
      }
    }
  }

  // 収益ポップ・紙吹雪
  for(let i=pops.length-1;i>=0;i--){
    pops[i].age += dt;
    if(pops[i].age>1.0) pops.splice(i,1);
  }
  for(let i=confs.length-1;i>=0;i--){
    const c = confs[i];
    c.age += dt;
    c.vy += 300*dt;
    c.x += c.vx*dt; c.y += c.vy*dt;
    if(c.age > c.life) confs.splice(i,1);
  }

  // 実績チェック(1秒ごと)
  achTimer -= dt;
  if(achTimer<=0){ checkAch(); achTimer = 1.0; }
}

// ---------- メインループ ----------
let lastT = performance.now();
let saveTimer = 0, hudTimer = 0;
function frame(now){
  const dt = Math.min((now-lastT)/1000, 0.1);
  lastT = now;
  const t = now/1000;
  tick(dt, t);
  draw(t);
  hudTimer -= dt;
  if(hudTimer<=0){ updateHud(); hudTimer = 0.25; }
  saveTimer += dt;
  if(saveTimer > 10){ save(); saveTimer = 0; }
  requestAnimationFrame(frame);
}

// タブが裏に回っている間も生産・実績を進める(描画はしない)
setInterval(()=>{
  if(!document.hidden) return;
  const now = performance.now();
  const dt = Math.min((now-lastT)/1000, 2);
  lastT = now;
  if(dt > 0) tick(dt, now/1000);
  saveTimer += dt;
  if(saveTimer > 10){ save(); saveTimer = 0; }
}, 1000);

// ---------- キャンバスサイズ ----------
function fit(){
  cv.width = W; cv.height = H;
  const wrap = $$("wrap");
  const r = wrap.getBoundingClientRect();
  const s = Math.min(r.width/W, r.height/H);
  cv.style.width = W*s + "px";
  cv.style.height = H*s + "px";
  cv.style.margin = "0 auto";
}
addEventListener("resize", fit);

// ---------- 起動 ----------
const loaded = load();
if(loaded){
  S = loaded;
  applyOffline();
  toast("💾 前回の続きからスタート!");
}else{
  S = newState();
  toast("🏭 ようこそ社長! まずは空きスロットにマシンを設置しよう");
}
resetActors();
fit();
updateHud();
addEventListener("beforeunload", save);
document.addEventListener("visibilitychange", ()=>{ if(document.hidden) save(); });
requestAnimationFrame(frame);
</script>
